  # ── Type 2: Text only — intro ────────────────────────────────────────────────
  - title_fi: ""
    title_en: ""
    text_fi: |
      Tanssiteatteri Rimpparemmi on alueellisesti merkittävä ammattitanssiteatteri, joka kiertää ympäri Suomea pohjoisinta Lappia myöten. Tanssin saavutettavuuden ja tunnettuuden lisääminen on merkittävä osa Rimpparemmin toimintaa.

      Ryhmä tuottaa vuosittain 2–4 ensi-iltaa eri ikäisille kohderyhmille. Rimpparemmin kotinäyttämönä toimii Kulttuuritalo Wiljami (Urheilukatu 1). Tanssiteatteriesityksiä on viety perinteisten näyttämötilojen lisäksi rohkeasti myös erilaisiin esiintymistiloihin kuten yökerhoon.

      Lastenkulttuuri ja taidekasvatus ovat olennainen osa Rimpparemmin toimintaa. Tanssiteatteri tuottaa vuosittain vähintään yhden lapsille suunnatun esityksen, jota esitetään laajasti ympäri Lappia ja muuta Suomea. Esitysten yhteydessä Rimpparemmi järjestää myös työpajoja, joissa lapset ja nuoret pääsevät tutustumaan tanssin ja teatterin maailmaan.
    text_en: |
      Dance Theatre Rimpparemmi is a regionally significant professional dance theatre that tours throughout Finland, reaching northern Lapland. Increasing the accessibility and visibility of dance is a central part of Rimpparemmi's work.

      The company produces 2–4 premieres annually for different age groups. Rimpparemmi's home venue is Kulttuuritalo Wiljami (Urheilukatu 1). Performances have been brought not only to traditional theatre spaces but boldly to unconventional venues such as nightclubs.

      Children's culture and arts education are an essential part of Rimpparemmi's activities. The theatre produces at least one performance for children each year, touring widely across Lapland and the rest of Finland. Alongside performances, Rimpparemmi also organises workshops where children and young people can explore the world of dance and theatre.
    image: ""
