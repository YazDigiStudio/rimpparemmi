  - image_alt_en: Dance Theatre Rimpparemmi performance
    title_fi: Rimpparemmin Missio
    image_orientation: square
    image_position: right
    title_en: Our Mission
    text_fi: >
      Ensisijaisesti Rimpparemmi tekee ja tuottaa korkeatasoista ja puhuttelevaa
      taidetta, jonka välineenä on tanssi. Tämän päävälineen ohella tärkeitä
      ilmaisumuotoja ovat myös musiikki, teatteri ja visuaalisuus. Rimpparemmin
      tanssiteoksissa nämä kaikki osa-alueet todentuvat ja tähtäävät samaan
      päämäärään: katsoja saa kokemuksen, joka liikuttaa hänen mieltään,
      vavahduttaa ajattelemaan ja tuntemaan.
    text_en: >
      Above all, Rimpparemmi creates and produces high-quality, compelling art
      with dance as its primary medium. Alongside dance, music, theatre, and
      visual elements are equally important forms of expression. In
      Rimpparemmi's works, all these elements combine and strive toward a single
      goal: to give the audience an experience that moves their mind, stirs
      thought, and awakens feeling.
