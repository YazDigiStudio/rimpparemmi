    image_position: "right"

  # ── Type 4: Title + text + image — Visio ─────────────────────────────────────
  - title_fi: "Rimpparemmin Visio"
    title_en: "Our Vision"
    text_fi: |
      Rimpparemmi on vahva tanssikulttuurin puolestapuhuja, joka vie korkeatasoisia tanssiteatteriesityksiä ympäri Lappia, Suomea ja ulkomaille. Esitystoiminnan ohessa koulutetaan uusia tanssitaiteen tekijöitä ja laaja-alaisia kulttuurinymmärtäjiä.

      Tanssitaide on tulevaisuudessa yhä tärkeämmässä roolissa esittävän taiteen kentässä. Rimpparemmi on rohkeasti ja energisesti mukana tuossa kehityksessä. Tanssi on kansainvälinen, kielestä riippumaton taidemuoto, jolle Rovaniemi ja Lappi ovat otollista maaperää matkailuelinkeinon tuoman kansainvälisen yleisön kautta.
    text_en: |
      Rimpparemmi is a strong advocate for dance culture, bringing high-quality dance theatre performances throughout Lapland, Finland, and internationally. Alongside its performance activities, the company trains new dance artists and broad-minded cultural thinkers.

      Dance art will play an increasingly important role in the performing arts in the future. Rimpparemmi is boldly and energetically part of that development. Dance is an international art form independent of language, and Rovaniemi and Lapland offer fertile ground for it through the international audiences brought by tourism.
    image: "https://firebasestorage.googleapis.com/v0/b/rimpparemmi-b3154.firebasestorage.app/o/cms%2Fweb%2F1773075375667-Kielletyt_liikkeet_kuva_Antti_Kurola__9_.webp?alt=media"
    image_alt_fi: "Tanssiteatteri Rimpparemmi esitys"
    image_alt_en: "Dance Theatre Rimpparemmi performance"
