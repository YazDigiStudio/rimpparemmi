    text_fi: >-
      **Tanssiteatteri Rimpparemmi** on rovaniemeläinen tanssiteatteri, joka on
      tunnettu voimakkaasta näyttämöenergiastaan ja omaleimaisesta tavastaan
      kertoa tarinoita liikkeen, musiikin, tekstin ja visuaalisuuden kautta.
      Rimpparemmi tuottaa vuosittain 3–5 ensi-iltaa eri ikäisille kohderyhmille.
      Kotinäyttämönä Rovaniemellä toimii Kulttuuritalo Wiljami (Urheilukatu 1).
      Rimpparemmin ohjelmisto koostuu omista tuotannoista, yhteistuotannoista
      sekä vierailevista esityksistä. Tärkeä osa toimintaa on myös esittävän
      taiteen illat, Remmi Liveklubit.


      Rimpparemmi perustettiin vuonna 1971. Toiminta alkoi kansantanssiryhmänä Tervolassa. Rimpparemmi toimi useita vuosia puoliammattimaisena ryhmänä, kunnes vuonna 2000 se hyväksyttiin valtion ammattiteattereille suunnatun rahoituslain piiriin. Rimpparemmi on Suomen pohjoisin ammattitanssiteatteri. Merkittäviä tukijoita ovat Opetus- ja kulttuuriministeriö sekä Rovaniemen kaupunki.
    text_en: >-
      Dance Theatre Rimpparemmi is a regionally significant professional dance
      theatre that tours throughout Finland, reaching northern Lapland.
      Increasing the accessibility and visibility of dance is a central part of
      Rimpparemmi's work.


      The company produces 2–4 premieres annually for different age groups. Rimpparemmi's home venue is Kulttuuritalo Wiljami (Urheilukatu 1). Performances have been brought not only to traditional theatre spaces but boldly to unconventional venues such as nightclubs.


      Children's culture and arts education are an essential part of Rimpparemmi's activities. The theatre produces at least one performance for children each year, touring widely across Lapland and the rest of Finland. Alongside performances, Rimpparemmi also organises workshops where children and young people can explore the world of dance and theatre.
