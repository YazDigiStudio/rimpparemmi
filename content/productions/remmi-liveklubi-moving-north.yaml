short_text_fi: "Remmi klubilla pöhistään maaliskuussa tanssielokuvasta. Kati Kallio tuo Moving North -tanssielokuvakiertueen Rovaniemelle palkittujen kotimaisten ja pohjoismaisten tanssielokuvien kera."
short_text_en: "In March, Remmi Live Club celebrates dance cinema. Kati Kallio brings the Moving North dance film tour to Rovaniemi, featuring award-winning Finnish and Nordic dance films."
long_text_fi: |
  Remmi klubilla pöhistään maaliskuussa tanssielokuvasta kun Kati Kallio tuo Moving North -tanssielokuvakiertueen Rovaniemelle. Moving North -kiertue esittää palkittuja kotimaisia ja pohjoismaisia tanssielokuvia yhdessä lappilaistaiteilijoiden teosten kanssa, nostaen moninaisen liikkeen keskeiseen osaan elokuvan kerronnassa. Näytöksen jälkeen on yleisö tuttuun tapaan tervetullut osallistumaan keskusteluun panelistien kanssa.

  Tanssielokuva on kahden vahvan taidelajin täydellinen ja monimuotoinen liitto. Se on taidemuoto, joka ylittää kielimuurit ja genrerajat – se on demokraattinen, saavutettava ja aina yhtä kiehtova.
long_text_en: |
  In March, Remmi Live Club celebrates dance cinema as Kati Kallio brings the Moving North dance film tour to Rovaniemi. The Moving North tour presents award-winning Finnish and Nordic dance films alongside works by Lapland-based artists, centering diverse movement as a key storytelling element in film. Following the screening, the audience is as always welcome to join a discussion with the panellists.

  Dance cinema is a rich and multifaceted union of two powerful art forms. It is an art form that transcends language barriers and genre boundaries — democratic, accessible, and endlessly fascinating.
