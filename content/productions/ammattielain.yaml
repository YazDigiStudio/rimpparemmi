short_text_en: Join us for an interactive adventure! In this children’s dance
  theater performance, the kids get to take part in the show.
long_text_fi: >-
  Hyppää mukaan interaktiiviseen seikkailuun! Tässä lasten tanssiteatteri
  esityksessä lapsetkin pääsevät osallistumaan teokseen. Neljän tutkijan ryhmä
  Villi Veikkaus tutkii luonnon monimuotoisuutta. Ammattieläin antaa vastauksen
  sille, mitä kirjekyyhkyt tekevät nykyään, millainen on kiiltomadon
  kirjoitustaito ja mikäs ihme se hiilijalanjälki onkaan.


  Upeat tanssikohtaukset ja esityksen tarttuva melodia saa jalan vipattamaan välittömästi. Eppu Nuotion ja Jukka Parkkisen runoista koostuvat laulujen sanat ilahduttavat niin lapsia kuin aikuisiakin Jukka Nurmelan säveltämän musiikin sytyttäessä esityksen henkiin.
long_text_en: >-
  Join us for an interactive adventure! In this children’s dance theater
  performance, kids get to participate in the show. A group of four researchers,
  Villi Veikkaus, studies biodiversity. A professional animal provides the
  answers to what carrier pigeons do these days, what the writing skills of a
  slug are like, and what on earth a carbon footprint is.


  The spectacular dance scenes and the performance’s catchy melody will have your feet tapping immediately. The lyrics, composed of poems by Eppu Nuotio and Jukka Parkkinen, delight both children and adults alike, while the music composed by Jukka Nurmela brings the performance to life.
