long_text_fi: >-
  Elämme nyt, aikana, jolloin menneisyyden sävelet heräävät henkiin ja
  yhdistyvät tämän päivän tunteisiin ja näkemyksiin. Tämä herättää meissä syvän
  halun ymmärtää elämää paremmin. Tapahtuma Piaf kuljettaa sinut musiikin ja
  liikkeen voimalla matkalle läpi eri aikakausien ja tilojen, luoden visuaalisen
  ja tunteikkaan frescon, joka sykkii Piafin sydämen tahdissa.


  Tanssiteatteri Rimpparemmin 50-vuotis juhlavuoden suurteos on ohjaaja-koreografi Ari Nummisen musiikintäyteinen teos “Tapahtuma Piaf”. Tapahtuma Piaf on Laulaja Edith Piafin elämästä ja lauluista inspiraationsa saanut esitys. Se on yhdistelmä konserttia ja tanssiteatteri esitystä. Tapahtuma Piafissa historiasta kuuluvat suuret maailman muutoksen kaiut ja synkät sävyt. Mutta keskellä tätä kaikkea soi ääni ja rakkaus – elämisen, rakastamisen ja olemassaolon vaikeus, mikä kurottaa kohti valoa. Non je regrette.


  Nämä kaikki elämän perusteemat, kaikki eletty, kuuluu Edith Piafin äänessä ja musiikissa. Sen lisäksi, että Tapahtuma Piafissa on mahdollisuus löytää tunnistettavia asioita, tapahtumia ja henkilöitä Piafin elämästä, esitys peilautuu myös tämän päivän teemoihin ihmisyydestä, parisuhteesta, merkityksistä. Vahvat visuaaliset kuvat vyöryvät päälle ja tulevat katsojan ihon alle. Miten elää elämä kokonaisena? Miten nauraa, kun haluaisi itkeä? 


  Tapahtumaa kuljettaa läpisävelletty musiikki Piafin alkuperäistuotantoa unohtamatta, ja tietenkin tanssi, ottaen vaikutteita niin Vaudeville numeroista, kuin voimakkaasta fyysisestä ilmaisusta ja tanssiteatterista.


  Tapahtuma Piaf on matka, joka alkaa Ranskasta ja päätyy Edith Piafin sydämeen helvetinmoisen mutkan kautta.
long_text_en: >-
  We are living in a time when the melodies of the past come to life and blend
  with the emotions and perspectives of today. This awakens in us a deep desire
  to better understand life. The Piaf Event takes you on a journey through
  different eras and spaces with the power of music and movement, creating a
  visual and emotional fresco that beats to the rhythm of Piaf’s heart.


  Dance Theater Rimpparemmi’s 50th-anniversary masterpiece is director-choreographer Ari Numminen’s music-filled work “Tapahtuma Piaf.” Tapahtuma Piaf is a performance inspired by the life and songs of singer Edith Piaf. It is a combination of a concert and a dance theater performance. In “Tapahtuma Piaf,” history resonates with the echoes of great global changes and somber tones. But amidst it all, a voice and love ring out—the difficulty of living, loving, and existing, reaching toward the light. Non je regrette.


  All these fundamental themes of life, everything she lived through, are heard in Edith Piaf’s voice and music. In addition to offering the chance to discover recognizable moments, events, and people from Piaf’s life, the performance also reflects on today’s themes of humanity, relationships, and meaning. Powerful visual images wash over you and get under your skin. How does one live life in its entirety? How does one laugh when one wants to cry?


  The performance is carried by a fully orchestrated musical score, without forgetting Piaf’s original works, and of course dance, drawing inspiration from both Vaudeville numbers and powerful physical expression and dance theater.


  The event Piaf is a journey that begins in France and ends in the heart of Edith Piaf via a hellish detour.
