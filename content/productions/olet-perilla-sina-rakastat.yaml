long_text_fi: >-
  ## **Olet perillä, sinä rakastat**


  ### **– musiikin, runon ja tanssin lämmin kohtaaminen**


  *Olet perillä, sinä rakastat* on noin 40 minuutin mittainen musiikillinen esitys, joka kuljettaa katsojan rakkauden eri sävyihin, toiseen ihmiseen, kaipuuseen ja itse elämään.


  Lavalla nähdään kolme esiintyjää: muusikko ja kaksi näyttämöllistä tulkitsijaa. Esitys rakentuu rakastettujen suomalaisten laulujen ympärille, joita rytmittävät runolliset tekstit ja hienovaraiset tanssilliset hetket. Tanssitaiteilija Laura Kallaksen liike tuo teokseen herkkyyttä ja kehollista läsnäoloa.


  Teoksen musiikillinen maailma on yleisölle tuttu ja helposti lähestyttävä – mukana ovat mm. Baddingin, Hectorin, Juha Tapion ja Eppu Normaalin rakastetut kappaleet. Kokonaisuus puhuttelee erityisesti seniori-ikäistä yleisöä, mutta koskettaa kaikenikäisiä.
long_text_en: >-
  ## **You figured it out, you love,**


  ### **– a heartwarming encounter of music, poetry, and dance**


  *You figured it out, you love,* is a musical performance lasting about 40 minutes that takes the audience on a journey through the different shades of love—for another person, for longing, and for life itself.


  Three performers take the stage: a musician and two stage performers. The performance is built around beloved Finnish songs, punctuated by poetic texts and subtle moments of dance. Dancer Laura Kallas’s movement brings sensitivity and a physical presence to the work.


  The musical world of the piece is familiar and accessible to the audience—featuring beloved songs by Badding, Hector, Juha Tapio, and Eppu Normaali, among others. The production particularly appeals to a senior audience but touches people of all ages.
