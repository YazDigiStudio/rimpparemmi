long_text_fi: >-
  Hävyttömän hyvä joulushow tuo lavalle pikkujouluihinkin sopivan musiikin ja
  tanssin täyteisen shown, joka ei varmasti petä joulutunnelmaa metsästävää
  katsojaa. Joulushown Joulushowbändi solistinaan Janne Raappana tarjoilee
  yleisölle Michael Bublen suurimmat jouluhitit, Jacques Brellin suomeksi
  käännetyt ajattomat ja kiihkeät laulut sekä tietysti ne perinteiset
  ”kauneimmat” joululaulut. Rimpparemmin Joulushowssa yhdistyy kouluaikain
  joulujuhlat ja hauskimmat pikkujoulu-ohjelmanumerot. Piparkakun tuoksuista
  kulttuuria ja hävyttömän hyviä esityksiä pikkujouluhengessä. Tervetuloa
  aloittamaan joulunvietto Rimpparemmin seurassa!


  Rimpparemmin hovimuusikot Henri Haakana harmonikassa ja Jukka Nurmela bassossa ovat keränneet ympärilleen Rovaniemen popmuusikoiden kermaa ja jouluisia lauluja tulkitsevat heidän ja Raappanan lisäksi pianisti Eero Aakala sekä kitaristi Mikko Nuorala. Oman piparintuoksuisen lisäyksen bändiin tuo twisted sistersinäkin tunnetut Rimpparemmin tanssijattaret Helmi Järvensivu ja Laura Kallas.


  Joulushowbändin ohjelmistossa on tänä jouluna Michael Bublen suurimmat jouluhitit, Jacques Brellin suomeksi käännetyt ajattomat ja kiihkeät laulut sekä tietysti ne perinteiset ”kauneimmat” joululaulut, jotka vedetäänkin sitten yhteislauluna karaoketyyliin.
long_text_en: >-
  This outrageously good Christmas show brings a performance packed with music
  and dance—perfect even for pre-Christmas parties—that is sure to delight
  anyone looking to get into the Christmas spirit. The Christmas Show Band,
  featuring soloist Janne Raappana, treats the audience to Michael Bublé’s
  greatest Christmas hits, Jacques Brel’s timeless and passionate songs
  translated into Finnish, and of course the traditional “most beautiful”
  Christmas carols. Rimpparemmi’s Christmas Show combines school-era Christmas
  parties with the funniest acts from pre-Christmas parties. Culture scented
  with gingerbread and outrageously good performances in the spirit of
  pre-Christmas parties. Welcome to kick off your Christmas celebrations in the
  company of Rimpparemmi!


  Rimpparemmi’s house musicians, Henri Haakana on accordion and Jukka Nurmela on bass, have gathered the cream of Rovaniemi’s pop musicians around them; in addition to them and Raappana, pianist Eero Aakala and guitarist Mikko Nuorala perform Christmas songs. Adding their own gingerbread-scented touch to the band are Rimpparemmi’s dancers Helmi Järvensivu and Laura Kallas, also known as the Twisted Sisters.


  This Christmas, the Christmas show band’s repertoire features Michael Bublé’s biggest Christmas hits, Jacques Brel’s timeless and passionate songs translated into Finnish, and of course those traditional “most beautiful” Christmas carols, which will be sung as a group sing-along in karaoke style.
