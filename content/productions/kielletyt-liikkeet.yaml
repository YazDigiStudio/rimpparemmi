short_text_en: Forbidden Movements is a thought-provoking and absurdly humorous
  performance about the limits of the body, movement, the mind, and memories.
  What moves us? What holds us back?
long_text_fi: >-
  **Kielletyt liikkeet** on ajatuksia herättävä ja absurdin humoristinen esitys
  kehon, liikkeen, mielen ja muistojen rajoista. Mikä meitä liikuttaa? Mikä
  meitä estää?


  *"Ei saa jättää sieniä metsään. Ei saa tömistellä. Älä ole kuin äitis. Ei saa hiihtää ilman pipoa. Ei saa tuijottaa. Ei saa olla jalat liian levällään. Ei saa olla liikaa"*


  Meitä ohjaavat säännöt, joita emme ole itse keksineet. Kenen ääni päässä toistaa varoituksia, vanhoja totuuksia ja perittyjä pelkoja? Mielen varjoissa istuvat jotkut, jotka tietävät paremmin. Jotkut, jotka kuiskaavat varoituksia ennen kuin ehdimme edes astua rajan yli. Mutta kuka rajan piirsi?


  Tämä esitys sukeltaa niihin kieltoihin, joita meille on annettu – ja niihin, jotka olemme itse ottaneet omiksemme. Mitä tapahtuu, kun keho tekee sen, mitä ei saisi? Kun liike muuttuu sopimattomaksi, oudoksi, leikkisäksi. Kun mieli liikkuu. Kun muistot liikuttavat.


  Mielen varastossa on koulun piha. Papan kumisaappaat. Selvittämätön riita. Saunalimppari. Ikäväitku. Väkivallan uhka. Hillasanko. Kielletyt eleet, sanat, ajatukset – kaikki se, mikä on painettu pois ja Macarena.


  Ei saa tehdä. Ei saa nähdä. Ei saa muistaa. Mutta jos unohdat, joku kyllä muistuttaa.
long_text_en: >-
  We are guided by rules we did not invent ourselves. Whose voice echoes
  warnings, old truths, and inherited fears in our heads? Lurking in the shadows
  of the mind are those who know better. Those who whisper warnings before we
  even have a chance to cross the line. But who drew that line?


  This performance delves into the prohibitions that have been imposed on us—and those we have adopted as our own. What happens when the body does what it shouldn’t? When movement becomes inappropriate, strange, playful. When the mind moves. When memories stir.


  In the mind’s storehouse lies the schoolyard. Grandpa’s rubber boots. An unresolved quarrel. A sauna loaf. A whimper of longing. The threat of violence. A rope noose. Forbidden gestures, words, thoughts—everything that has been erased, and the Macarena.


  You must not do it. You must not see it. You must not remember it. But if you forget, someone will surely remind you.
