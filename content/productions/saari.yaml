short_text_en: Kaisa Ristiluoma takes the listener on a journey to the scenic
  island of Saari. A place where the listener can find peace, hear the rustling
  of the forest, and encounter dancing elves.
long_text_fi: Kaisa Ristiluoma vie kuulijan matkalle luonnonkauniille Saarelle.
  Paikkaan, jossa kuulija voi hiljentyä, kuulla metsän hyräilyä ja kohdata
  tanssivia haltijoita. Rakkaus kansanmusiikkiin ja luontoon sekä kiinnostus
  mystiikkaan ovat olleet Kaisalle suunnan näyttäjinä Saaren luomistyössä. Hänen
  säveltämänsä musiikki, Sari Lehtimäen henkisyyttä, läsnäoloa ja onnellisuutta
  huokuvat tekstit sekä Antti Lindholmin maalaileva äänimaisema luovat
  elämyksen, jonka kantava ajatus onni on. Tässä.
long_text_en: Kaisa Ristiluoma takes the listener on a journey to the scenic
  island of Saari. A place where the listener can find peace, hear the rustling
  of the forest, and encounter dancing elves. Her love of folk music and nature,
  as well as her interest in mysticism, have guided Kaisa in the creation of
  \*Saari\*. The music she composed, Sari Lehtimäki’s lyrics—which exude
  spirituality, presence, and happiness—and Antti Lindholm’s evocative
  soundscape create an experience whose central theme is happiness. Right here.
