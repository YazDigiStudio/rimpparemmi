long_text_fi: >-
  On häät. Kirkko on täynnä ihmisiä, kukkia ja odotuksia. Kaikki on valmiina.
  Paitsi morsian.


  Sulhanen on kiltti. Ihan liian kiltti. Bestman katsoo vähän liian pitkään. Leopardilegginsit ottavat tilan, jonka joku muu luuli omakseen. Ja kaiken keskellä kertoja puhuu suoraan yleisölle jo tietäen miten tässä käy.


  Lavalla soi livemusiikki. Tango palaa yhä uudestaan. Juhla kiihtyy, repeää ja menee vähän yli. Ja sitten vielä yli.


  *Birgitta – linnutkin itkevät taivaalla* on Tanssiteatteri Rimpparemmin syksyn ensi-ilta 16.10. Kulttuuritalo Wiljamissa. Matti Paloniemen ohjauksessa häät muuttuvat visuaaliseksi vyöryksi, jossa kauneus ja karheus kulkevat käsi kädessä. Räkää ja rosoa ei säästellä eikä tunteita siivota. Se on absurdi, fyysinen ja tunnistettava. Nauru tulee nopeasti ja jää vähän kurkkuun.


  Ihmiset eksyvät toistensa luo ja löytävät ehkä jotain, mitä eivät olleet edes etsimässä.


  **[Täältä varmistat ryhmällesi ikimuistoisen illan!](https://docs.google.com/forms/d/e/1FAIpQLSfFKIJ2sBEGdbpZ__O77rA-qm9qgPqR8dxLfP83if8CSJqlHw/viewform)**
long_text_en: >-
  There’s a wedding. The church is filled with people, flowers, and
  expectations. Everything is ready. Except the bride.


  The groom is kind. Far too kind. The best man lingers a little too long. Leopard leggings take up space someone else thought was theirs. And in the middle of it all, the narrator speaks directly to the audience, already knowing how this will end.


  Live music fills the stage. The tango keeps returning. The celebration builds, unravels, and goes a little too far. And then even further.


  *Birgitta – even the birds weep in the sky* is Dance Theatre Rimpparemmi’s autumn premiere on October 16 at Cultural House Wiljami. Directed by Matti Paloniemi, the wedding transforms into a visual surge where beauty and roughness go hand in hand. Nothing is polished away — not the mess, not the emotion. It is absurd, physical, and deeply recognizable. The laughter comes quickly — and catches in your throat.


  People lose their way to one another and perhaps find something they weren’t even looking for.
