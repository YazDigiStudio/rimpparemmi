long_text_fi: >-
  ## **Laulumetsästäjät**


  ### **– musiikillinen seikkailu suomalaisen laulun juurille**


  *Laulumetsästäjät* on vauhdikas ja humoristinen musiikkiteatteriesitys, jossa sukelletaan suomalaisen lauluperinteen juurille.


  Tarina alkaa, kun Asiasta-Tietämätön kohtaa kaksi hieman omalaatuista opasta – Laulunhistoriat. Nämä hyväntahtoiset ja vähän homssuiset hahmot johdattavat hänet matkalle halki aikojen: arkkiveisuista rekilauluihin ja runolaulusta tähän päivään.


  Matkan varrella selviää, miten menneiden aikojen laulut elävät yhä tämän päivän musiikissa – iskelmässä, rockissa, popissa ja räpissä. Esitys yhdistelee elävää musiikkia, tarinankerrontaa ja leikillistä näyttämöllisyyttä tavalla, joka tempaa mukaansa nuoren yleisön.


  Lavalla kohdataan myös värikkäitä hahmoja markkinamiehistä Elias Lönnrotiin, ja tieto karttuu kuin huomaamatta, hauskasti ja yhdessä.
long_text_en: >-
  ## **The Song Hunters**


  ### **– a musical adventure to the roots of Finnish song**


  *The Song Hunters* is a fast-paced and humorous musical theater production that delves into the roots of the Finnish song tradition.


  The story begins when Asiasta-Tietämätön meets two somewhat eccentric guides—Laulunhistoriat. These good-natured and slightly bumbling characters lead him on a journey through the ages: from archival recordings to sleigh songs and from runo singing to the present day.


  Along the way, it becomes clear how the songs of the past still live on in today’s music—in schlager, rock, pop, and rap. The performance combines live music, storytelling, and playful theatricality in a way that captivates young audiences.


  On stage, you’ll also meet colorful characters ranging from market vendors to Elias Lönnrot, and knowledge accumulates almost unnoticed, in a fun and collaborative way.
