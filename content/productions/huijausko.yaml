short_text_fi: Huijausko -esityksessä neljä tanssijaa ovat keskellä erikoista peliä.
short_text_en: In the performance *Huijausko*, four dancers find themselves in
  the middle of a peculiar game.
long_text_fi: >-
  Huijausko -esityksessä neljä tanssijaa ovat keskellä erikoista peliä. Teos
  rakentuu erilaisista tehtävistä, joista esiintyjille annetaan pisteitä. Sen
  aiheet sivuavat rehellisyyttä, pelkoa olla outo, teeskentelyn taitoa,
  kiusaamista ja tietysti rakkautta. Esityksen nuoret – Jane, Immu, Teemu ja
  Terhi-Taineli- joutuvat kisaamaan paremmuudesta; kuka on vakavissaan ja kuka
  huijaa.


  Parasta katsottuna yli 12-vuotiaana.
long_text_en: >-
  In the performance \*Huijausko\*, four dancers find themselves in the middle
  of a peculiar game. The piece is built around various tasks for which the
  performers are awarded points. Its themes touch on honesty, the fear of being
  different, the art of pretense, bullying, and, of course, love. The young
  performers—Jane, Immu, Teemu, and Terhi-Taineli—must compete to prove who is
  serious and who is cheating.




  Best viewed by those 12 and older.
