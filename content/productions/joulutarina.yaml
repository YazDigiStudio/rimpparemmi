long_text_fi: >-
  Tuvan piippu tupruttaa Korvajoen kalastajakylässä. Pirtin lämmössä puuhaavat
  äiti, isä, Nikolas ja Aada. Elo on onnella täytetty. Illan koitteessa
  pikku-Aada sairastuu ja tarvitsee lääkäriä. Perhe jättää Nikolaksen kotia
  vahtimaan ja pakkautuu rekimatkalle, joka koituu kohtaloksi. Matka päättyy
  meren pohjaan ja tekee Nikolaksesta orvon. Kylän väki ottaa pojan omakseen,
  vaikka varaa ei olisi. Hän asuu vuoden yhdessä talossa ja muuttaa jouluisin
  seuraavaan. Elämä alkaa kulkea, kylä kukoistaa ja Nikolaksesta kasvaa poika,
  jolla on sydän paikallaan. Hän veistää jouluaatoiksi lahjan kaikille
  kasvattiperheilleen. Aada, kadonnut merenneitosisarkin saa oman nukkensa.


  Tulee tiukka talvi, kevät on kaukana ja perheiltä ei riitä ruokaa ottopojalle. Korvatunturin Iisakki, pelottava puuseppämestari, keksii vaatia Nikolaksen apurikseen. On lähdettävä kohti tunturia, jonka kupeesta löytyy sepän paja täynnä rattaita, hihnoja ja vempeleitä. Sen uumenissa Nikolas alkaa opetella ammattiin ja mieheksi. Hänelle aukeaa suuri tehtävä. Millainen tehtävä on? Se selviää sinulle Lappia-talossa, jonka huomassa valmistuu perheteatteria joulun ajaksi. Käy mukaan tarinaan.


  *Esitys pohjautuu Marko Leinon romaaniin ja Juha Wuolijoen elokuvaan Joulutarina, jonka on ohjannut Juha Wuolijoki, tuottanut Juha Wuolijoki/Snapper Films Oy ja käsikirjoittanut Marko Leino.*
long_text_en: >-
  Smoke curls from the chimney of a cottage in the fishing village of Korvajo.
  Inside the warm cottage, Mother, Father, Nikolas, and Aada are busy with their
  chores. Life is filled with happiness. As evening falls, little Aada falls ill
  and needs a doctor. The family leaves Nikolas to watch the house and sets off
  on a sleigh ride that proves to be their undoing. The journey ends at the
  bottom of the sea, leaving Nikolas an orphan. The villagers take the boy in,
  even though they have no means to support him. He lives in one house for a
  year and moves to the next one at Christmas. Life goes on, the village
  flourishes, and Nikolas grows into a boy with a good heart. He carves a gift
  for all his foster families for Christmas Eve. Aada, the lost mermaid sister,
  gets her own doll.




  A harsh winter arrives, spring is far off, and the families don’t have enough food for the foster boy. Iisakki of Korvatunturi, a fearsome master carpenter, decides to demand that Nikolas become his assistant. They must set off toward the fell, at the foot of which lies a blacksmith’s workshop full of wheels, belts, and contraptions. There, Nikolas begins to learn his trade and grow into a man. A great task awaits him. What kind of task is it? You’ll find out at Lappia House, where a family theater production is being prepared for Christmas. Come join the story.




  The performance is based on Marko Leino’s novel and Juha Wuolijoki’s film A Christmas Story, directed by Juha Wuolijoki, produced by Juha Wuolijoki/Snapper Films Oy, and written by Marko Leino.
