short_text_fi: Liikenteessä on hupaisa lasten tanssiteatteriesitys, jossa vihreä
  ja punainen liikennevalo liikkuvat läpi kaupungin välillä törmäillen ja
  riidellen, mutta aina yhteiset säännöt löytäen. Esitys kertoo
  liikennekäyttäytymisen varjolla suvaitsevaisuudesta ja toisten huomioimisesta.
short_text_en: "\"In Traffic\" is a delightful children's dance theater
  performance in which a green and a red traffic light move through the city,
  bumping into each other and arguing, but always finding common ground. Through
  the lens of traffic behavior, the performance conveys a message of tolerance
  and consideration for others."
