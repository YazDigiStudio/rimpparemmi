long_text_fi: >-
  ## Remmi Liveklubi – Adele Sauros Quartet


  Huhtikuun 12. Remmi Liveklubi kutsuu jälleen jazzin ystäviä, kun [Adele Sauros](http://adelesauros.com/) Quartet ottaa Kulttuuritalo Wiljamin lavan haltuunsa.


  Pohjoismaisen ja amerikkalaisen jazzin tyylejä yhdistelevä Adele Sauros Quartet on perustettu vuonna 2012 ja se on julkaissut levyt Adele Sauros: I Paint You (Fresh Sound Records 2021), Adele Sauros: My Spontaneous Mind (2016) ja Adele Sauros Quartet: It’s Who I Am (2014). Esiintymisiä on ollut Suomen merkittävimmillä jazz-festivaaleilla sekä Pohjoismaissa. Yhtye edusti vastikään Suomea Nordic Jazz Comets tapahtumassa Montmartre Jazz Klubilla Kööpenhaminassa 2022 ja teki tapahtumaan tiimoilta Suomen Jazz-liiton järjestämän kiertueen Ruotsissa.


  Neljäs albumi koostuu Sauroksen sävellyksistä, jotka käsittelevät toipumista ja toivon löytämistä. Melodiset ja vakavat sävellykset ammentavat vaikutteita pohjoismaisen ja amerikkalaisen jazzin perinteestä. Sauros uskoo sävelten voivan muuttaa maailmaa, jos tekee taidetta omin ehdoin kuten Adele Sauros Quartet. Yhtyeen jäsenet ovat virtuoottisia jazz-muusikoita, joilla on avoimet mielet sekä uskallusta poiketa myös totutuista kaavoista ja heittäytyä improvisoimaan spontaanisti.
long_text_en: >-
  ## Remmi Live Club – Adele Sauros Quartet


  On April 12, Remmi Live Club once again invites jazz lovers as the [Adele Sauros](http://adelesauros.com/) Quartet takes the stage at Kulttuuritalo Wiljami.


  Combining Nordic and American jazz styles, the Adele Sauros Quartet was founded in 2012 and has released the albums Adele Sauros: I Paint You (Fresh Sound Records 2021), Adele Sauros: My Spontaneous Mind (2016), and Adele Sauros Quartet: It’s Who I Am (2014). The group has performed at Finland’s most prominent jazz festivals as well as throughout the Nordic region. The ensemble recently represented Finland at the Nordic Jazz Comets event at the Montmartre Jazz Club in Copenhagen in 2022 and, in connection with the event, undertook a tour of Sweden organized by the Finnish Jazz Federation.


  The fourth album consists of Sauros’s compositions, which explore themes of recovery and finding hope. The melodic and contemplative compositions draw inspiration from the traditions of Nordic and American jazz. Sauros believes that music can change the world if you make art on your own terms, just like the Adele Sauros Quartet. The band members are virtuoso jazz musicians with open minds and the courage to step outside familiar patterns and throw themselves into spontaneous improvisation.
