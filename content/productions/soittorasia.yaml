long_text_fi: >-
  Musiikin täyteinen esitys vie katsojansa matkalle läpi vuosikymmenten.
  Tuttujen musiikkikappaleiden siivittämänä pääsemme matkustamaan esimerkiksi
  Meksikosta Lapin tuntureille sekä menneisyydestä nykyaikaan. Välillä hypätään
  moottoripyörän selkään viilettäen hurjasti pitkin maantietä, kun taas
  seuraavassa hetkessä omat jalat ja kaunis maisema riittävät.


  Rimpparemmin muusikot ja tanssijat toimivat esityksen kuljettajina, joiden tärkeimpänä tehtävänä on liikuttaa katsojaansa kohti iloisempaa oloa ja tuoda piristystä arjen kulkuun. Rimpparemmin Soittorasia ottaa katsojansa myös fyysisesti mukaan musiikkimatkalle menneisiin vuosikymmeniin osallistavien ja kehoa virkistävien harjoitteiden kautta.


  Matkustamisessa kuten elämässäkin päämäärä ei ole tärkein, vaan kaikki se mitä matkalla tapahtuu ja keitä matkallamme tapaamme.
long_text_en: >-
  This music-filled performance takes the audience on a journey through the
  decades. Accompanied by familiar songs, we get to travel from Mexico to the
  fells of Lapland, and from the past to the present. One moment we’re hopping
  on the back of a motorcycle, speeding wildly down the highway, while the next,
  our own two feet and the beautiful scenery are enough.


  Rimpparemmi’s musicians and dancers serve as the guides of the performance, whose primary mission is to move the audience toward a happier state of mind and bring a boost of energy to the flow of everyday life. Rimpparemmi’s Music Box also takes its audience on a physical journey through the decades via participatory and body-invigorating exercises.


  In travel, as in life, the destination isn’t the most important thing—it’s everything that happens along the way and the people we meet on our journey.
