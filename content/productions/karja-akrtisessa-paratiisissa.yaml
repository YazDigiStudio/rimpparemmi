long_text_fi: >-
  Lappi – tuo matkailijan ihmeellinen erämaa, missä aito ja alkuperäinen kohtaa
  punaiset tontut ja jouluvalot, mystiikan ja poronsarvijauheen. Karja
  arktisessa paratiisissa on ronski kuvaus ihmisistä, joille aidot perinteet ja
  keinotekoiset houkuttimet ovat iloista yhteen sulautumaa ikuisen joulun
  maassa. Löytyykö kuorrutuksen alta vielä koskematonta, jos oikein kunnolla
  kairaa? 


  Voimakas tanssi, mahtipontinen äänimaailma ja lappikuvaston runsas ja rajaton käyttö tarjoavat kokijalleen elämyksen, joka sykähdyttää perinpohjaisesti. Esitys jättää taatusti katsojansa pohtimaan Lappia. Esitystä ei suositella alle 12-vuotiaille.
long_text_en: >-
  Lapland—that marvelous wilderness for travelers, where authenticity and
  tradition meet red elves and Christmas lights, mysticism and reindeer antler
  powder. Cattle in the Arctic Paradise is a gritty portrayal of people for whom
  authentic traditions and artificial attractions blend joyfully in the land of
  eternal Christmas. Is there still something untouched beneath the surface, if
  you dig deep enough? 




  Powerful dance, a grandiose soundscape, and the rich and boundless use of Lappish imagery offer the audience an experience that stirs the soul to its core. The performance is sure to leave viewers pondering Lapland. The performance is not recommended for children under 12.
