short_text_fi: Hurmureita ja huviveroa –esitys vie katsojat 1950- ja
  1960-lukujen iltamatunnelmiin kuvitteellisen tanssiorkesteri Laulavan Simpukan
  mukana.
short_text_en: The show "Hurmureita ja huviveroa" transports the audience back
  to the atmosphere of 1950s and 1960s dance parties, accompanied by the
  fictional dance band Laulava Simpukka.
long_text_fi: "Hurmureita ja huviveroa –esitys vie katsojat 1950- ja
  1960-lukujen iltamatunnelmiin kuvitteellisen tanssiorkesteri Laulavan Simpukan
  mukana. Orkesterin ohjelmisto koostuu Olavi Virran, Kaj Chydeniuksen ja Henry
  Theelin kaltaisten klassikkojen musiikin lisäksi myös tämän päivän
  svengaavammasta musiikista. Laulava Simpukka ei pelkästään laula ja musisoi,
  vaan orkesterin jäsenet intoutuvat välillä tanssimaan tangon ja humpan
  pyörteissä ja jopa runoilemaan. Musiikin ja tanssin lomassa tulee esiin myös
  orkesterin jäsenten oma elämä ja kohtalo: rakastumiset, hylkäämiset, ilot ja
  surut."
long_text_en: 'The show "Hurmureita ja huviveroa" transports the audience back
  to the atmosphere of 1950s and 1960s dance parties, accompanied by the
  fictional dance band Laulava Simpukka. The band’s repertoire consists not only
  of classics by Olavi Virta, Kaj Chydenius, and Henry Theel, but also of
  today’s groovier tunes. Laulava Simpukka doesn’t just sing and play music; the
  band members are occasionally inspired to dance to the rhythms of the tango
  and humppa, and even to recite poetry. Amid the music and dancing, the band
  members’ own lives and fates also come to the fore: falling in love, being
  rejected, joys, and sorrows.'
