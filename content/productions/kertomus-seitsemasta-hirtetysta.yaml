short_text_en: The story of the seven hanged deals with power and freedom. The
  prison walls surround the seven condemned men and their guard; the clock is
  ticking.
long_text_fi: >-
  ”Jos maailma on hullu, sitä voi ravistella vain suuremmalla hulluudella”


  Kertomus seitsemästä hirtetystä käsittelee valtaa ja vapautta. Vankilan muurit ympäröivät seitsemää kuolemaantuomittua ja heidän vartijaansa, kello käy. Ihmisten valintoja ja kohtaloita sekä vallan armottomuutta tarkastellaan röyhkeästi rienaavan huumorin kautta. Esitys vyöryy katsojan eteen puheen, tanssin, laulun, musiikin ja videoiden voimin. Luvassa on rakkautta ja energiaa, vimmaa ja anarkiaa, vihaa ja empatiaa sekä naurua ja kyyneleitä.


  Käsikirjoitus perustuu venäläisen Leonid Andrejevin pienoisromaaniin vuodelta 1908.
long_text_en: >-
  “If the world is mad, it can only be shaken by greater madness”




  The Story of the Seven Hanged deals with power and freedom. Prison walls surround seven death row inmates and their guard, and the clock is ticking. People’s choices and fates, as well as the ruthlessness of power, are examined through boldly irreverent humor. The performance sweeps over the audience with the power of speech, dance, song, music, and video. Expect love and energy, frenzy and anarchy, hatred and empathy, as well as laughter and tears.




  The script is based on a novella by the Russian author Leonid Andreyev from 1908.
