short_text_fi: Vanhat ystävykset kokoontuvat vuosien jälkeen viettämään yhteistä
  iltaa. Jokainen on muuttunut. Vanhat tunteet ja tapahtumat nousevat pintaan.
  Kuka tilannetta johtaa?
short_text_en: Old friends gather after many years to spend an evening together.
  Everyone has changed. Old feelings and memories resurface. Who is in charge of
  the situation?
long_text_fi: >-
  ”Mie oon kuitenki onnelline” rakentuu herra Kohtalon muistojen ja haaveiden
  myötä näyttämölliseksi peliksi, jossa ei aina tiedä kumpi on todempaa: herra
  Kohtalo vai haaveet. Vanhat ystävykset kokoontuvat vuosien jälkeen viettämään
  yhteistä iltaa. Jokainen on muuttunut. Vanhat tunteet ja tapahtumat nousevat
  pintaan. Kuka tilannetta johtaa? Ottaako jokainen vastuun toimistaan? Mistään
  haaveilusta tai unimaailmasta ei kuitenkaan ole kysymys, vaan Rimpparemmin
  tanssijat heittäytyvät vimmalla elämänmakuisen tanssin pyörteisiin.




  > *”Luin Rosa Liksomin novellikokoelman Perhe. Se herätti mieleeni joukon henkilöhahmoja, jotka jäivät pyörimään päähäni. Siitä on jo vuosia. Nuo hahmot palasivat jälleen ajatuksiini sijoittuen -70 luvulle. Siis vuosikymmenelle jolloin synnyin. Tuli nostalginen olo ja sitten tuli tämmöinen esitys.” -Matti Paloniemi*
long_text_en: >-
  But I’m Happy Anyways unfolds through Mr. Fate’s memories and dreams into a
  theatrical play where it’s not always clear which is more real: Mr. Fate or
  his dreams. Old friends gather after many years to spend an evening together.
  Everyone has changed. Old feelings and events resurface. Who is in control of
  the situation? Does everyone take responsibility for their actions? However,
  this is not about daydreams or a dream world; instead, the dancers of
  Rimpparemmi throw themselves with abandon into the whirlwind of a dance full
  of the flavor of life.






  “I read Rosa Liksom’s short story collection Perhe. It brought to mind a group of characters who kept swirling around in my head. That was years ago. Those characters returned to my thoughts, set in the ’70s. That is, the decade when I was born. I felt nostalgic, and then this performance came about.” -Matti Paloniemi
