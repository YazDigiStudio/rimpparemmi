long_text_fi: >-
  Musaklubin vieraana huhtikuussa on rovaniemeläinen säveltäjä ja
  kuvataiteilija Johanna Ruotsalainen, jonka uusi poikkitaiteellinen
  teos Depression Suite saa kantaesityksensä Rimpparemmin tulkitsemana.
  Ruotsalainen on tehnyt viime vuosina yhteistyötä merkittävien kansainvälisten
  nykymuusikoiden ja nykymusiikkifestivaalien kanssa, ja säveltäjän edellisestä
  Suomen kantaesityksestä on kulunut jo yli vuosikymmen.


  Nykymusiikkia, animaatioprojisointeja ja tanssia yhdistävä neliosainen sarja tutkii masennusta ja ahdistuneisuushäiriötä arkisesta, jopa humoristisestakin näkökulmasta. Esitystaiteen eri elementtejä yhdistämällä teos haluaa lisätä nykymusiikin samaistuttavuutta erilaisille yleisöille. Teoksessa ihmisääni, harmonikka, kontrabasso ja elektroninen musiikki kietoutuvat tanssin, koreografian ja animaation kanssa yhdeksi suureksi ahdistuksen alhoksi ja mielettömäksi mentaalipainiksi.


  Esityksen yhteydessä järjestetään keskustelu taiteilijan pahoinvoinnista.
long_text_en: >-
  Musaklubi’s guest in April is Rovaniemi-based composer and visual artist
  Johanna Ruotsalainen, whose new interdisciplinary work Depression Suite will
  receive its world premiere performed by Rimpparemmi. In recent years,
  Ruotsalainen has collaborated with prominent international contemporary
  musicians and contemporary music festivals, and it has been over a decade
  since the composer’s last Finnish premiere.


  This four-part series, which combines contemporary music, animated projections, and dance, explores depression and anxiety disorders from an everyday, even humorous, perspective. By combining various elements of performance art, the work aims to make contemporary music more relatable to diverse audiences. In the piece, the human voice, accordion, double bass, and electronic music intertwine with dance, choreography, and animation to form one vast abyss of anxiety and senseless mental anguish.


  A discussion on the artist’s malaise will be held in conjunction with the performance.
