long_text_fi: >-
  Kuvittele tyhjä tila. Mahdollisuuksien ja muotojen määrä on
  ääretön.  Asetelmia on tanssiteoksena fyysinen ja vuorovaikutuksellinen
  mahdollisuus tutkia tyhjää tilaa ja luoda sinne energiaa sekä muuttaa sitä.


  Asetelmia on abstrakti nykytanssiteos kolmelle tanssijalle. Sen lähtökohtana on tilallinen kompositio ja halu saada esille edes yksi silmää tyydyttävä asetelma. Koreografin tehtävänä on ajatella tilaa ja sen rytmiä, rakennetta ja energiaa, tavoitteena saada aseteltua esiintyjät koreografin silmää miellyttäväksi kuvaksi. Mahdollisuuksien määrä tuntuu loputtomalta ja lopulta tila itsessään alkaa muovaamaan tapahtumia. Tilaa rajaa voimakas graafinen valaistus. Hillitty ja samaan aikaan räjähtävä tunnelma on kuin elävä liikkeellinen kuvataideteos. 


  Teoksen mystisestä ja industriaalisesta äänimaisemasta vastaa Rimpparemmin Jukka Nurmela. Valosuunnittelu on tarkkanäköisen ja oivaltavan Jukka Laukkasen käsialaa. Avant gardemaisen puvustuksen on luonut rovaniemeläinen Jaana Isokangas.


  *”Kolme tanssijaa lavalla, tehtävänä asetella heidät tyydyttävästi tilaan. Tuntuu mahdottomalta.”* – Atte Herd
long_text_en: >-
  Imagine an empty space. The possibilities and forms are endless.  As a dance
  piece, Stills offers a physical and interactive opportunity to explore empty
  space, infuse it with energy, and transform it.


  Stills is an abstract contemporary dance piece for three dancers. Its starting point is spatial composition and the desire to create at least one visually pleasing arrangement. The choreographer’s task is to consider the space and its rhythm, structure, and energy, with the goal of arranging the performers into an image pleasing to the choreographer’s eye. The possibilities seem endless, and eventually the space itself begins to shape the events. The space is defined by powerful graphic lighting. The atmosphere, both subdued and explosive, is like a living, moving work of visual art. 


  Rimpparemmi’s Jukka Nurmela is responsible for the work’s mystical and industrial soundscape. The lighting design is the work of the perceptive and insightful Jukka Laukkanen. The avant-garde costumes were created by Jaana Isokangas from Rovaniemi.


  “Three dancers on stage, the task is to position them satisfactorily within the space. It feels impossible.” – Atte Herd
