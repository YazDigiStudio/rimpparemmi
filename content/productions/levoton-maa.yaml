short_text_fi: Vierauden kohtaamista pohtiva Levoton maa on saanut
  inspiraationsa Edward W. Saidin teoksesta Orientalismi.
short_text_en: Restless Earth, which explores the experience of otherness, draws
  its inspiration from Edward W. Said’s book Orientalism.
long_text_fi: >-
  Vierauden kohtaamista pohtiva Levoton maa on saanut inspiraationsa Edward W.
  Saidin teoksesta Orientalismi. Tekijöiden kiinnostuksen kohteena on kuitenkin
  ollut tarkastella toiseuden hahmottamista yleisemmällä tasolla. Osaamme
  tulkita tuntematonta tai vierasta vain omasta maailmankuvastamme käsin –
  samalla muokkaamme todellisuutta itsellemme ymmärrettävään tai ylipäänsä
  mahdolliseen muotoon. Kuvaajan ulkopuolisuus suhteessa kuvattavaan asiaan sekä
  vieraan kulttuurin kohtaamiseen erottamattomasti liittyvät jako “meihin” ja
  “heihin” luovat verhon, jonka takaa on vaikea nähdä toinen tai tulla itse
  nähdyksi.


  Teos tarttuu aiheeseensa fyysisyydellä ja luottaa kahden esiintyjän tarkkaan yhteistyöhön. Hienovireisesti yhteen soivat kehot rakentavat kudelman, josta kerros kerrokselta paljastuu henkilökohtaisempia sävyjä.
long_text_en: >-
  Restless Earth, which explores the experience of otherness, draws its
  inspiration from Edward W. Said’s book Orientalism. However, the authors have
  been interested in examining the perception of otherness on a more general
  level. We can only interpret the unknown or the foreign through the lens of
  our own worldview—and in doing so, we reshape reality into a form that is
  comprehensible to us, or even possible at all. The photographer’s external
  position in relation to the subject, as well as the encounter with a foreign
  culture, are inextricably linked to the division between “us” and “them,”
  creating a veil behind which it is difficult to see the other or to be seen
  oneself.


  The work engages with its subject through physicality and relies on the precise collaboration of the two performers. Their bodies, harmonizing with subtle precision, weave a tapestry from which, layer by layer, more personal nuances are revealed.
