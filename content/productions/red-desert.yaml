long_text_fi: >-
  Red Desert on teos kolmelle naistanssijalle, jossa esiintyjät asettuvat
  tutkimaan aggression eri kehollistumia. Teoksessa aggressio moninaisuudessaan
  toimii lähtökohtana virtuoosiselle liikemateriaalille, kehollisuuksille ja
  kompositiolle.Käsittelemme aggressiota ruumiillisena tapahtumana, energiana,
  suuntana, monialaisena, universaalina ja dynaamisena ilmiönä, joka resonoi
  esiintyjien kokemushorisonttia vasten. Teoksen maailma on inspiroitunut
  Clarissa Pinkola Estésin kirjasta Naiset, jotka kulkevat susien kanssa (1992),
  joka käsittelee villinaisen arkkityyppejä myyteissä ja kertomuksissa.


  Estésin kirjan innoittamana teoksen lähtökohtina toimivat kysymykset ja pohdinnat naisen aggressiosta, sen vieraudesta sekä eri ilmenemismuodoista kulttuurisesti. Teoksessa aggressio on toimintaa eteenpäin vievä ja muutosta liikkeellepaneva voimana. Aggressio on muutoksen motivaatio.


  Clarissa Pinkola Estésin kirjassa on tarina La Lobasta, Susinaisesta, joka inspiroi teoksen maailmaa ja ehdottaa sille dramaturgisen rakenteen. La Loba on tarina villinaisen arkkityypistä, joka elää aavikolla maailmassa maailmojen välissä luoden ja ottaen elämän. Tarinassa aggressio, vaistonvaraisuus, intuitio, maanläheisyys, tunteet, luovuus, villiys ja vapaus saavat loistaa läsnäolollaan sekä hyväksyttävyydellään. Aggressio nivoo nämä ilmiöt toisiinsa. Tämä näkökulma on myös teoksemme ytimessä.


  Teosta ovat tukeneet: Taiteen Edistämiskeskus, Samuel Huberin Taidesäätiö

  sekä Liisa Pentti+Co residenssi
long_text_en: >-
  Red Desert is a piece for three female dancers in which the performers explore
  various physical manifestations of aggression. In the piece, aggression in all
  its forms serves as the starting point for virtuosic movement, physicality,
  and composition.We treat aggression as a physical event, an energy, a
  direction, a multidisciplinary, universal, and dynamic phenomenon that
  resonates with the performers’ experiential horizon. The world of the work is
  inspired by Clarissa Pinkola Estés’s book Women Who Run with the Wolves
  (1992), which explores the archetypes of the wild woman in myths and stories.


  Inspired by Estés’s book, the work’s starting points are questions and reflections on female aggression, its strangeness, and its various cultural manifestations. In the work, aggression is a force that propels action forward and sets change in motion. Aggression is the motivation for change.


  Clarissa Pinkola Estés’s book contains the story of La Loba, the She-Wolf, which inspires the world of the work and suggests its dramaturgical structure. La Loba is a story of the wild woman archetype, who lives in the desert in a world between worlds, creating and taking life. In the story, aggression, instinct, intuition, earthiness, emotions, creativity, wildness, and freedom shine through their presence and their acceptance. Aggression ties these phenomena together. This perspective is also at the heart of our work.


  This work has been supported by: the Arts Promotion Centre Finland, the Samuel Huber Art Foundation,


  and the Liisa Pentti+Co Residency
