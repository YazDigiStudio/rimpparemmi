long_text_fi: >-
  Belgialainen näyttelijä, ohjaaja ja laulaja-lauluntekijä Jacques Brel on
  myynyt yli 25 miljoonaa levyä, mikä kertoo hänen kappaleidensa suosiosta ja
  ajattomuudesta. Brelin kappaleita kutsutaan chansoneiksi, ja hänen
  menestyksensä salaisuus on ehkä juuri laulujen teksteissä. Jacques Breliä
  onkin sanottu tekstiensä vuoksi myös runoilijaksi. Breliä pidetään yhtenä
  kaikkien aikojen parhaana ranskankielisenä säveltäjänä, ja hänen tekstejään on
  käännetty monelle kielelle. 


  Tässä esityksessä muusikot päästävät kaiken irti. Välillä juostaan kuin härät kohti kuolemaa ja välillä pidätetään hengitystä, jotta ei sanottaisi liikaa. Konsertti koostuu Brelin tuotannon helmistä, jotka on käännetty suomenkielelle.


  Jacques Brelin laulut kertovat isosti elämästä; rakkaudesta, kuolemasta, yhteiskunnallisista havainnoista. Synkkiäkin aiheita käsitellään hulvattomasti Brelin tapaan. *Amsterdam*, *Vanhojen rakastavaisten laulu* (La chanson des vieux amants), *Jos nyt menet pois* (Ne me quitte pas) ja muut chanson-klassikot vievät kuulijan Amsterdamin kaduille ja sieltä aina hellään ja katkeraan rakkauteen.


  Kokoonpanon kapellimestarina toimii Jukka Nurmela, joka haluaa tuoda esityksen lähelle Brelin uran alkuaikojen intiimien ja hämyisten klubikeikkojen tunnelmaa. Nurmelan kontrabasson lisäksi kokoonpanossa kuullaan Anne-Mari Kanniaisen harmonikkaa ja Lauri Uusitalon pianoa. Brelin tekstejä tulkitsee laulullaan näyttelijä Joni Kuokkanen.
long_text_en: >-
  Belgian actor, director, and singer-songwriter Jacques Brel has sold over 25
  million records, a testament to the popularity and timelessness of his songs.
  Brel’s songs are known as chansons, and the secret to his success may well lie
  in the lyrics. In fact, Jacques Brel has also been called a poet because of
  his lyrics. Brel is considered one of the greatest French-language songwriters
  of all time, and his lyrics have been translated into many languages. 


  In this performance, the musicians let loose. At times they charge like bulls toward death, and at times they hold their breath so as not to say too much. The concert consists of gems from Brel’s oeuvre, translated into Finnish.


  Jacques Brel’s songs speak grandly of life: of love, death, and social observations. Even somber topics are handled with Brel’s characteristic humor. Amsterdam, The Song of the Old Lovers (La chanson des vieux amants), If You Leave Me Now (Ne me quitte pas), and other chanson classics transport the listener to the streets of Amsterdam and from there to tender yet bittersweet love.


  The ensemble is conducted by Jukka Nurmela, who aims to bring the performance close to the intimate and dimly lit atmosphere of the club gigs from the early days of Brel’s career. In addition to Nurmela’s double bass, the ensemble features Anne-Mari Kanniainen on accordion and Lauri Uusitalo on piano. Actor Joni Kuokkanen interprets Brel’s lyrics through his singing.
