long_text_fi: >-
  Tiloja / Avaruuksia on Tanssiteatteri Rimpparemmille luotu teos, joka
  pohjautuu Georges Perecin (1936-1982) samannimiseen teokseen Espéces d`espaces
  (1974). Koreografina toimii Carl Knif. Tanssiteoksen kimmokkeena toimii
  Perecin teoksissa toistuvat pohdiskelut tilan ja paikan hahmottumisesta ja sen
  eri merkityksistä. Tanssiteos on humoristinen ja mielikuvituksellinen
  tutkielma tilasta kaikissa sen välittömästi ilmenevissä muodoissa.


  Teos asettuu tarkastelemaan esitystilanteen perinteisiä käytäntöjä ja samalla se kutsuu katsojan leikkiin teatteritilan elementtien ja niistä syntyviin mielleyhtymien kanssa. Teoksessa Perecin tekstien mielivaltaisuus kohtaa poeettisen ja hienovaraisen tanssin. Välillä teksti toimii rytminä ja liikettä määrittävänä elementtinä, välillä ilmaisu saattaa katsojan runollisiin muistojen ja unien maisemiin
long_text_en: >-
  Spaces / Universes is a work created for Dance Theater Rimpparemmi, based on
  Georges Perec’s (1936–1982) book of the same name, Espèces d’espaces (1974).
  Carl Knif serves as the choreographer. The dance piece is inspired by the
  recurring reflections in Perec’s works on the perception of space and place
  and their various meanings. The dance piece is a humorous and imaginative
  exploration of space in all its immediately apparent forms.


  The work examines the traditional practices of the performance situation while inviting the audience to play with the elements of the theatrical space and the associations they evoke. In the piece, the arbitrariness of Perec’s texts meets poetic and subtle dance. At times, the text functions as a rhythm and an element defining movement; at other times, the expression transports the viewer into poetic landscapes of memories and dreams.
