long_text_fi: >-
  Ankkalampi on lapsille suunnattu vauhdikas tanssiteatteriseikkailu, jonka
  koreografi Riku Immonen on sovittanut H.C. Andersenin klassikkosadusta Ruma
  ankanpoikanen.


  Kaakattavan ankkapesueen hylkäämänä ruma poikanen alkaa uteliaana etsiä paikkaansa maailmassa. Pyrstö vaappuen taittuva matka on täynnä jännittäviä ja hauskoja kohtaamisia. Voiko kurkeen samaistua? Mitä tapahtuu mummon tuvassa? Onko karhua syytä pelätä?


  Ankanpoikanen haluaisi löytää kaltaisiaan, mutta löytääkin lopulta itsensä. Esitys käsittelee lasten ja tanssin kielellä erilaisuutta ja syrjäytymistä, yksilön asemaa sekä oman persoonallisuuden tärkeyttä erilaisissa yhteisöissä.
long_text_en: >-
  The Duck Lake is a fast-paced dance theater adventure for children, adapted by
  choreographer Riku Immonen from H.C. Andersen’s classic fairy tale The Ugly
  Duckling.


  Rejected by a quacking flock of ducks, the ugly duckling sets out on a curious journey to find his place in the world. His wobbly, tail-wagging journey is full of exciting and funny encounters. Can he identify with the crane? What happens in Grandma’s cottage? Is there reason to fear the bear?


  The duckling would like to find others like themself, but ultimately finds themself. The performance uses the language of children and dance to explore difference and exclusion, the individual’s place in society, and the importance of one’s own personality within various communities.
