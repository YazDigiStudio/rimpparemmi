long_text_fi: >
  A Fistful of Funk on katutanssia, absurdia teatteri ja livemusiikkia
  yhdistelevä esitys, joka käsittelee ystävyyttä, sukupuoliroolien ja
  maskuliinisuuden teemoja leikin, huumorin ja virtuoosimaisen katutanssin
  avulla.


  Teoksessa kolme yksinäistä cowboyta lähtee yhdessä eeppiselle matkalle halki aavikon. Matkalla 1970-luvun funk-tanssi yhdistyy näytelmäkirjailija Juho Keräsen tekstiin, jonka inspiraationa on Sergio Leonen lännenelokuvien toksinen machismo ja hypermaskuliinisuus.


  Locking on 1970-luvulla Yhdysvaltain länsirannikolla afrikkalaisamerikkalaisten keskuudessa syntynyt tanssityyli, jolle ovat ominaisia terävät pysähdykset, groovaavat askeleet ja akrobaattiset temput. Esityksessä syvennytään yhteen Lockingin keskeisistä elementeistä: characteriin eli tanssijan ominaislaatuun. Hahmojen ja leikin kautta esitys tutkii vaihtoehtoisia maskuliinisia ilmaisuja ja esittelee samalla kunkin esiintyjän ainutlaatuista tyyliä ja persoonaa.


  Will Funk For Food on vuonna 2008 perustettu, yksi Suomen kansainvälisesti menestyneimmistä katutanssiryhmistä, joka on erikoistunut Locking-tanssityyliin. WFFF tekee tanssilajiaan tunnetuksi Suomessa, ja pyrkii toiminnallaan vakiinnuttamaan katutanssia osaksi suomalaista kulttuuritarjontaa sekä tuomaan iloa ja riemua kaikenikäisille. Tanssiryhmän suurimpia meriittejä ovat kolminkertainen peräkkäinen SM-kulta, sekä esityksiä niin Japanissa, Ranskassa kuin Itämeren takana Ruotsissa.
long_text_en: >
  A Fistful of Funk is a performance combining street dance, absurd theatre, and
  live music. Through play, humour, and virtuosic street dance, it explores
  themes of friendship, gender roles, and masculinity.


  Three lonely cowboys set off on an epic journey across the desert. Along the way, 1970s funk dance meets text by playwright Juho Keränen, inspired by the toxic machismo and hypermasculinity of Sergio Leone's Western films.


  Locking emerged in the 1970s on the US West Coast within African American communities, characterised by sharp freezes, groovy steps, and acrobatic tricks. The production focuses on one of Locking's key elements: character — the dancer's individual quality and presence. Through characters and play, the show explores alternative expressions of masculinity while showcasing each performer's unique style and personality.


  Founded in 2008, Will Funk For Food is one of Finland's most internationally successful street dance groups, specialising in Locking. Their achievements include three consecutive Finnish Championship gold medals and performances in Japan, France, and Sweden.
