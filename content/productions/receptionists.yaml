short_text_en: Two receptionists who love their jobs are waiting for a flood of
  guests to arrive at the Five Stars Hotel. For these receptionists, the most
  important thing is to succeed in their work and make a good impression—at any
  cost.
long_text_fi: >-
  Kesällä 2022 Edinburghin valloittanut esteettisesti harkittu ja fyysisesti
  tarkka klovneriaesitys Receptionists on kahden klovnin käsitys täydellisestä
  asiakaspalvelusta. Kaksi työtään rakastavaa vastaanottovirkailijaa odottavat
  asiakkaiden tulvaa Five Stars -hotelliin. Näille vastaanottovirkailijoille
  tärkeintä on työssään onnistuminen ja hyvän vaikutelman antaminen – hinnalla
  millä hyvänsä. 


  Hulvattomat Inga Björn ja Kristiina Tammisalo ammentavat asiakaspalvelutyön koomisista ja absurdeista puolista. Esityksen mehukas klovneria ja tarkka fyysisyys ei jätä ketään kylmäksi ja sopii kaikille ikäryhmille.
long_text_en: >-
  Receptionists, an aesthetically refined and physically precise clown show that
  took Edinburgh by storm in the summer of 2022, is two clowns’ take on perfect
  customer service. Two receptionists who love their jobs await a flood of
  guests at the Five Stars Hotel. For these receptionists, the most important
  thing in their work is success and making a good impression—at any cost.


  The hilarious Inga Björn and Kristiina Tammisalo draw on the comical and absurd aspects of customer service work. The show’s lively clowning and precise physicality leave no one cold and is suitable for all age groups.
