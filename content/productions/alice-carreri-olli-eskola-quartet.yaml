long_text_fi: >-
  Tammikuun lopulla 26.1.2024 klo 19 avaa ovensa Remmi Liveklubi, jossa kuullaan
  jazzia, kun italialais-tanskalainen jazzlaulaja Alice Carreri lumoaa yleisönsä
  Olli Estola Quartetin solistina. 


  Heidän monipuolinen ohjelmistonsa kuljettaa kuulijat jazzin historian halki Billie Holidayn, Cole Porterin ja Kurt Weillin sävelistä aina Black Keysin ja Janelle Monaen moderneihin kappaleisiin. Ilta tarjoaa aikamatkan 1930-luvulta aina 2000-luvulle saakka.


  Italialais-tanskalainen jazzlaulaja Alice Carreri on ollut osana Kööpenhaminan jazzyhteistöä jo kauan. Hän on esiintynyt muun muassa Jacob Fischerin, Hans Ulrikin, Hugo Rasmussenin sekä Jacob Christoffersenin kanssa, työskennellyt Tivoli Big Bandin solistina erinäisissä produktioissa, sekä säveltänyt näyttämömusiikkia eri tanssi- ja teatterinäytöksiin. Olli Estolan johtama oululais-kvartetti on säestänyt Alicea kymmenen vuoden ajan.
long_text_en: >-
  At the end of January, on January 26, 2024, at 7 p.m., Remmi Liveklubi will
  open its doors to a night of jazz, as Italian-Danish jazz singer Alice Carreri
  captivates the audience as the soloist with the Olli Estola Quartet.


  Their diverse repertoire takes listeners on a journey through jazz history, from the melodies of Billie Holiday, Cole Porter, and Kurt Weill to the modern songs of the Black Keys and Janelle Monáe. The evening offers a journey through time from the 1930s all the way to the 2000s.


  Italian-Danish jazz singer Alice Carreri has been part of Copenhagen’s jazz scene for a long time. She has performed with Jacob Fischer, Hans Ulrik, Hugo Rasmussen, and Jacob Christoffersen, among others; worked as a soloist with the Tivoli Big Band in various productions; and composed stage music for various dance and theater performances. The Oulu-based quartet led by Olli Estola has accompanied Alice for ten years.
