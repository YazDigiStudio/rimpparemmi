short_text_fi: Tanssiteatteri MD:n Aliveness-teos kahdelle tanssijalle
  hengittää, hengästyy ja hahmottaa itseään aina uudelleen ja uudelleen.
short_text_en: Dance Theater MD’s piece Aliveness, for two dancers, breathes,
  gasps, and redefines itself over and over again.
long_text_fi: >-
  > *This is the flower of a Partisan, died for freedom.* 


  Nykytanssiteos ihmisyydestä ja inhimillisyydestä, inspiraatioinaan italialainen kansanlaulu Bella Ciao.


  > *Ärsyke, peli*

  > *Reaktio, riippuvuus*

  > *Läsnäolo, empatia*

  > *Vapaus, eläimellisyys*

  >

  > *Tuonpuoleinen.*


  Tanssiteatteri MD:n Aliveness-teos kahdelle tanssijalle hengittää, hengästyy ja hahmottaa itseään aina uudelleen ja uudelleen. Duetto ottaa vaikutteita ympäristöstään sekä kommentoi maailmanpoliittista tilannetta abstraktissa kontekstissa. Mari Rosendahlin koreografioimasta teoksesta on nähty esitysluonnoksia eri tiloissa, jotka ovat vaikuttaneet Alivenessin tunnelmaan.
long_text_en: >-
  > *This is the flower of a Partisan who died for freedom.*


  A contemporary dance piece about humanity and humaneness, inspired by the Italian folk song "Bella Ciao."


  > *Stimulus, play*

  >

  > *Reaction, dependence*

  >

  > *Presence, empathy*

  >

  > *Freedom, animality*

  >

  > *The afterlife.*


  Dance Theater MD’s Aliveness, a piece for two dancers, breathes, gasps, and redefines itself over and over again. The duet draws inspiration from its surroundings and comments on the global political situation in an abstract context.Mari Rosendahl's choreographed work has been presented in various venues, which have influenced the atmosphere of Aliveness.
