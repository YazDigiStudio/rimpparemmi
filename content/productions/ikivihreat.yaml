short_text_en: Evergreens is a musical experience and cultural journey through
  past decades designed for residents of assisted living and nursing homes.
long_text_fi: >-
  Ikivihreät on palvelu- ja hoivakotien asukkaille suunniteltu musiikillinen
  elämys ja kulttuurimatka menneille vuosikymmenille. Muistojen soittorasia
  avautuu ja harmonikan, kitaran ja laulun säestyksellä ikivihreät ihastuttavat
  kuulijaa! Iskelmät ja tutut laulut eri vuosikymmeniltä laulattavat ja
  liikuttavat hoivakotien ja palvelutalojen asukkaita. Laulujen lomassa voi myös
  osallistua leppoisaan aktiviteettiin musiikin tahdissa oman toimintakyvyn
  mukaan.


  Ikivihreät soivat akustisesti ja sopii tilaan kuin tilaan.
long_text_en: >-
  Evergreens is a musical experience and cultural journey through past decades
  designed for residents of nursing homes and assisted living facilities. The
  music box of memories opens, and accompanied by accordion, guitar, and vocals,
  these evergreens delight the audience! Pop hits and familiar songs from
  different decades get residents of nursing homes and assisted living
  facilities singing along and moved to tears. Between songs, residents can also
  participate in lighthearted activities set to the music, according to their
  own abilities.


  Ikivihreät performs acoustically and fits perfectly into any setting.
