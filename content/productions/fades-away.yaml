long_text_fi: >-
  Fades Away on veteen pohjautuva visuaalinen ja fyysinen näyttämöteos, joka
  heijastelee yksilön valintojen ja toiminnan yhteyttä maailman ekologiseen
  tilaan. Katsojan sielunmaailman kanssa samassa rytmissä virtaava teos
  koskettaa vahvalla läsnäololla ja inhimillisellä otteella, muistuttaen samalla
  kaiken katoavaisuudesta.


  Fades away leikittelee maagisten visuaalisten lavakuvien ja arkirealistisen komiikan välillä, jossa teatterin illuusio rikotaan ja rakennetaan kerta toisensa jälkeen uudelleen. MimoArt Companyn omalakinen poikkitaiteellinen ajattelu kaihtaa totuttuja genremäärittelyjä. Teos yhdistää taitavasti nykytanssia, butoa, fyysistä miimiä ja -teatteria sekä klovneriaa. Teoksen omintakeinen liikekieli yhdessä vaikuttavan visuaalisuuden ja äänimaailman kanssa rakentavat katsojien eteen oivaltavan, monitasoisen ja kokonaisvaltaisesti koskettavan elämyksen.


  Fades Away on MimoArt Companyn kolmiosaisen WATER TRILOGY -teossarjan toinen osa. Teoksen toteutuksesta vastaa kansainvälinen, poikkitaiteellinen työryhmä. MimoArt Companyn, Tanssiteatteri Minimin ja Tanssiteatteri Rimpparemmin yhteistuotantona toteutettava teos saa ensi-iltansa Kuopion kaupunginteatterissa 1.10.2021, jonka jälkeen se nähdään Kuopiossa 2.10.-12.11.2021  ja Rovaniemellä 8.10.-20.11.2021.


  Teos on sanaton. Kesto 1,5 h ei väliaikaa.


  Suosittelemme pukeutumaan esitystilaan kevyesti, tilassa on esityksen ajan lämmintä ja kosteaa.
long_text_en: >-
  Fades Away is a water-based visual and physical stage production that reflects
  the connection between an individual’s choices and actions and the ecological
  state of the world. Flowing in rhythm with the viewer’s inner world, the piece
  touches the audience with its powerful presence and human touch, while
  reminding us of the transience of all things.


  Fades Away plays with magical visual imagery and everyday realism, where the illusion of theater is repeatedly shattered and rebuilt. MimoArt Company’s unique interdisciplinary approach defies conventional genre classifications. The work skillfully combines contemporary dance, butoh, physical mime and theater, and clowning. The piece’s distinctive movement language, together with its striking visuals and soundscape, creates an insightful, multi-layered, and deeply moving experience for the audience.


  Fades Away is the second part of MimoArt Company’s three-part WATER TRILOGY series. The production is led by an international, interdisciplinary team. A co-production by MimoArt Company, Dance Theater Minimi, and Dance Theater Rimpparemmi, the work will premiere at the Kuopio City Theater on October 1, 2021, and will run in Kuopio from November 2 October–November 12, 2021, in Kuopio and October 8–November 20, 2021, in Rovaniemi.


  The performance is wordless. Running time: 1.5 hours, no intermission.


  We recommend dressing lightly for the performance; the venue will be warm and humid during the show.
