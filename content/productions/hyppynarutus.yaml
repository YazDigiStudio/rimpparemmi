short_text_fi: Vuoden 2026 hillittömin ja rytmikkäin parivaljakko, Hyppy ja Naru
  valmiina matkaan!
short_text_en: The wildest and most energetic duo of 2026, Hyppy and Naru, are ready to go!
long_text_fi: >-
  Minimaalisilla keinoilla maksimaalinen teatterikokemus. Vuorovaikutteisen
  teoksen hahmot, Hyppy ja Naru ovat pomppimisen erikoisasiantuntijoita. Heillä
  ei käy aika pitkäksi, kun leluina ovat hyppynarut. Niiden avulla he vievät
  katsojat maailman korkeimmalle vuorelle Mount Everestille, laittavat pystyyn
  hullunkuriset urheilukisat ja toteuttavat jopa ikioman sirkusesityksen.


  > Tervetuloa mukaan tälle rytmikkäälle hyppymatkalle, mutta pidä varasi – saatat joutua huomaamattasi narutetuksi!


  Koreografi Jaakko Toivonen hakee tanssiteoksiinsa usein inspiraatiota omasta lapsuudestaan. Lapsuudesta, jossa itsekeksityt seikkailut olivat kaikkein mieluisimpia leikkejä. Hiekkalaatikko saattoi muuttua hotelliksi, vaatekaappi portaaliksi toiseen ulottuvuuteen ja pyörätelineet hevostalliksi. Leikin avulla voi koetella mielikuvituksen rajoja. Ja Hyppynarutus -tanssiteos tekee juuri sen!
long_text_en: >-
  A maximum theatrical experience with minimal means. The characters in this
  interactive piece, Hyppy and Naru, are experts in bouncing. They never get
  bored when their toys are jump ropes. With them, they take the audience to the
  world’s highest mountain, Mount Everest, organize a zany sports competition,
  and even put on their very own circus show.


  Welcome aboard this rhythmic jumping adventure, but watch out—you might find yourself tied up before you know it!


  Choreographer Jaakko Toivonen often draws inspiration for his dance works from his own childhood. A childhood where self-invented adventures were the most beloved games. A sandbox could turn into a hotel, a wardrobe into a portal to another dimension, and bike racks into a stable. Through play, one can test the limits of the imagination. And the dance piece Hyppynarutus does just that!
