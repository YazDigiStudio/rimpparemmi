short_text_fi: Lorusta tanssiksi – koko perheen tanssiteos on hauska tarina akasta ja luudasta
short_text_en: "From a Rhyme to a Dance – A Dance Performance for the Whole
  Family: A Fun Story About a Broom and a Dustpan"
long_text_fi: >-
  Koko perheen teos Akka ja luuta on leikkisä, avoin ja utelias lapsille tehty
  tanssisatu. Teoksen lähtökohtana on koreografi Joona Halosen loru, jonka hän
  kuvittaa mielikuvitusta kutkuttavalla nykytanssilla. Teoksessa luuta taipuu
  moneksi ja sitä ladataan vesivoimalla. Elämä ja sen pienet ihmeet ovat
  keskiössä esityksessä. Upea satukirjamainen projisointi elävöittää ja
  osallistaa esitykseen niin pienet kuin isommat katsojat. 


  ”Ja matka jatkuu taas,

  nyt viuh, vauh, vouh.

  Akka nauraa heko, heko,

  on luudalla lentäminen paras ilmastoteko!”.
long_text_en: >-
  A production for the whole family, \*Akka ja luuta\* is a playful, open, and
  curious dance fairy tale created for children. The piece is based on a nursery
  rhyme by choreographer Joona Halonen, which he brings to life with imaginative
  contemporary dance. In the piece, the broom takes on many forms and is powered
  by water. Life and its small wonders are at the heart of the performance. A
  magnificent, storybook-like projection brings the performance to life and
  engages both young and older viewers alike.


  “And the journey continues once more,


  now whoosh, whoosh, whoosh.


  The old woman laughs, heko, heko,


  flying on a broomstick is the best climate action!”
