long_text_fi: >-
  Keväällä 2021 valmistui kuusi tanssivideota. 




  ### Kylttyyri


  <https://www.youtube.com/watch?v=eakMsRtkGxc&list=PLOnhzzdoD-FadFZqCUqXjC5tfSlctwHd4>


  Hienovarainen kannanotto tapahtuma- ja kulttuurialan unohtamisesta koronavuoden aikana. Ihmisille ei ole ollut tarjolla kulttuurin nälkään juuri mitään koronan aikana. Eläköön kulttuuri ministeri!


  Ohjaajat Joni Kuokkanen ja Laura Kallas-Herd


  Kuvaajana Antti Lindholm ja Atte Herd


  Editointi Antti Lindholm


  Sävellys Jean-Philippe Rameu, sävellyksen nimi La Poule.


  Puvut Tiia Aspegrén




  ### Lähellä


  <https://www.youtube.com/watch?v=avSe5n02unc&list=PLOnhzzdoD-FadFZqCUqXjC5tfSlctwHd4&index=2>


  Kosketus on teko, jota on alkanut kaipaamaan. Ei ole koskettu toista tuntematonta, uutta tuttua vahingossa tai tarkoituksella. Kuitenkin halu koskea toista ja koskettaa ei ole kadonnut mihinkään.


  Ohjaus Atte Herd


  Kuvaus ja editointi Antti Lindholm


  Sävellys Jukka Nurmela


  Soittajat Mikko Nuorala, Anna Laakso ja Jukka Nurmela.


  Puvut Tiia Aspegrén




  ### Mööse


  <https://www.youtube.com/watch?v=cLiN98CyJE8&list=PLOnhzzdoD-FadFZqCUqXjC5tfSlctwHd4&index=3>


  Mööses äre big, mägnificent änimäls thät äre börn tö wänder the wörld freely. The räre sight öf seeing än ädult Mööse in the wild is truly exträördinäry. Mödern wörld brings mäny chällenges to Mööses lifestyle, cutting their träditiönäl migrätiön röutes with röäds änd mötörwäys, but yet these wönderful änimäls survive änd persist. Such is the miräcle öf Näture.


  Ohjaaja Antti Lindholm


  Kuvaus ja editointi Antti Lindholm


  Puvut Tiia Aspegrén




  ### Sillat


  <https://www.youtube.com/watch?v=VFPJRWkgRXA&list=PLOnhzzdoD-FadFZqCUqXjC5tfSlctwHd4&index=4>


  Rovaniemi on kahden joen risteyskohta: Ounasjoki yhtyy Kemijokeen keskellä kaupunkia. Joki virta kaupungin läpi sykkivänä suonena. Se lipuu majesteettisena useiden siltojen alitse. Jokien yllä leijuvat sillat yhdistävät kaupungin eri osia. Rovaniemeä halkaisee myös syvällä kulkeva maantie kuin railo keskellä kaupunkia. 4-tien ylitse voi kulkea useita siltoja myöten. Siltoja myöten kulkevat ihmiset ja historia.


  Ohjaaja Matti Paloniemi


  Kuvaus Antti Lindholm


  Editointi Atte Herd


  Sävellys Henri Haakana


  Soittajat Henri Haakana ja Jukka Nurmela.


  Puvut Tiia Aspegrén




  ### Sammonkatu


  <https://www.youtube.com/watch?v=RnIrfa_7Ikw&list=PLOnhzzdoD-FadFZqCUqXjC5tfSlctwHd4&index=5>


  Sammonkatu on marssi läpi lähes tyhjän kauppakeskuksen. Marssi ilmaisee näyttämötaiteen elementtejä: teippiä, valoa, ääntä ja hikeä. Kaupallinen suora, kulttuurin kuja, elämä ja koronamaski


  Ohjaaja Marjo Selin


  Kuvaus ja editointi Atte Herd


  Sävellys Mikko Nuorala


  Soittajat Mikko Nuorala, Anna Laakso ja Jukka Nurmela.


  Puvut Tiia Aspegrén




  ### Kuppilan lohet


  <https://www.youtube.com/watch?v=GysF8QSIr84&list=PLOnhzzdoD-FadFZqCUqXjC5tfSlctwHd4&index=6>


  Kuppilan lohet on ilon hypähdys luoteisnurkassa Rovaniemen rajalla, Lohinivan Lohihovissa, muhevien munkkien ja kahvintuoksun kodissa. Mitä tapahtuisi ilman kyliä, omaperäisiä maalauksia ja lohien nousua?


  Ohjaaja Marjo Selin


  Kuvaus ja editointi Antti Lindholm


  Musiikin sävellys Jukka Nurmela


  Soittajat Mikko Nuorala, Anna Laakso ja Jukka Nurmela.


  Puvut Tiia Aspegrén
long_text_en: >-
  Six dance videos were completed in the spring of 2021.




  ### Kylttyyri


  https://www.youtube.com/watch?v=eakMsRtkGxc&list=PLOnhzzdoD-FadFZqCUqXjC5tfSlctwHd4


  A subtle commentary on the neglect of the events and culture sector during the pandemic. People have had virtually nothing to satisfy their hunger for culture during the pandemic. Long live the Minister of Culture!


  Directors Joni Kuokkanen and Laura Kallas-Herd


  Cinematographers Antti Lindholm and Atte Herd


  Editing by Antti Lindholm




  ### Closeness


  https://www.youtube.com/watch?v=avSe5n02unc&list=PLOnhzzdoD-FadFZqCUqXjC5tfSlctwHd4&index=2


  Touch is an act one has begun to long for. One has not touched another stranger, a new acquaintance, by accident or on purpose. Yet the desire to touch another and to be touched has not disappeared anywhere.


  Directed by Atte Herd


  Filming and Editing Antti Lindholm


  Composition Jukka Nurmela


  Performers Mikko Nuorala, Anna Laakso, and Jukka Nurmela.


  Costumes Tiia Aspegrén




  ### Mööse


  [https://www.youtube.com/watch?v=cLiN98CyJE8&list=PLOnhzzdoD-FadFZqCUqXjC5tfSlctwHd4&index=3](<>)


  Mööses äre big, mägnificent änimäls thät äre börn tö wänder the wörld freely. The räre sight öf seeing än ädult Mööse in the wild is truly exträördinäry. Mödern wörld brings mäny chällenges to Mööses lifestyle, cutting their träditiönäl migrätiön röutes with röäds änd mötörwäys, but yet these wönderful änimäls survive änd persist. Such is the miräcle öf Näture.


  Ohjaaja Antti Lindholm


  Kuvaus ja editointi Antti Lindholm


  Puvut Tiia Aspegrén




  ### Bridges


  https://www.youtube.com/watch?v=VFPJRWkgRXA&list=PLOnhzzdoD-FadFZqCUqXjC5tfSlctwHd4&index=4


  Rovaniemi lies at the confluence of two rivers: the Ounasjoki and the Kemijoki meet in the center of the city. The river flows through the city like a pulsating vein. It flows majestically under several bridges. The bridges spanning the rivers connect different parts of the city. Rovaniemi is also bisected by a highway running deep through the city like a rail. You can cross Highway 4 via several bridges. People and history pass over these bridges.


  Director Matti Paloniemi


  Cinematography Antti Lindholm


  Editing Atte Herd


  Composition Henri Haakana




  ### Sammonkatu


  https://www.youtube.com/watch?v=RnIrfa_7Ikw&list=PLOnhzzdoD-FadFZqCUqXjC5tfSlctwHd4&index=5


  Sammonkatu is a march through an almost empty shopping center. The march incorporates elements of performing arts: tape, light, sound, and sweat. A commercial thoroughfare, a cultural alley, life, and a face mask


  Director Marjo Selin


  Filming and editing Atte Herd


  Composition by Mikko Nuorala


  Performed by Mikko Nuorala, Anna Laakso, and Jukka Nurmela.


  Costumes by Tiia Aspegrén




  ### Kuppilan lohet


  https://www.youtube.com/watch?v=GysF8QSIr84&list=PLOnhzzdoD-FadFZqCUqXjC5tfSlctwHd4&index=6


  Kuppilan lohet is a burst of joy in the northwest corner on the outskirts of Rovaniemi, at Lohiniva’s Lohihovi, home to fluffy doughnuts and the aroma of coffee. What would happen without the villages, the unique paintings, and the salmon run?


  Director Marjo Selin


  Cinematography and editing by Antti Lindholm


  Music composed by Jukka Nurmela


  Performed by Mikko Nuorala, Anna Laakso, and Jukka Nurmela.


  Costumes by Tiia Aspegrén
