short_text_fi: Taiteellisen vapauden innoittamana syntyi Rimpparemmin kuuden
  teoksen esitys, jonka sisällöstä vastaavat tanssijat ja muusikot itse.
short_text_en: Inspired by artistic freedom, Rimpparemmi created a performance
  consisting of six pieces, with the dancers and musicians themselves
  responsible for the content.
long_text_fi: >-
  Tanssiteatteri Rimpparemmin taiteilijat ovat
  tehneet *vallankaappauksen* ohjelmistomuutoksen, jonka myötä *taiteellinen
  johtaja on sidottu ja suljettu toimiston pimeään holviin* johtajalla on
  vapaapäivä. Taiteellisen vapauden innoittamana syntyi Rimpparemmin kuuden
  teoksen esitys, jonka sisällöstä vastaavat tanssijat ja muusikot itse.


  ## Sivustakatsoja


  Koreografia ja tanssi: Anni Pilhjärta 


  Ääni ja valosuunnittelu: Antti Lindholm


  Pukusuunnittelu: Kaija Maunula


  Sivustakatsoja tasapainoilee vaikuttumisen ja vaikuttamisen välimaastossa tarkkaillen, kokien ja katsoen – näkökulmaa etsien. Kääntyykö katse sisäänpäin vai avautuuko näkymä ulos?


  *”Those who experience do not participate in the world.”* – Martin Buber


  ## Sommitelma yhdelle epävarmalle taiteilijalle


  Koreografia ja tanssi: Helmi Järvensivu


  Ääni ja valosuunnittelu: Antti Lindholm


  Pukusuunnittelu: Kaija Maunula


  Kaiken alla vain yksi epävarma taiteilija. Teos epävarmuudesta, teos olemassa olosta, teos tietoisuudesta että joku katsoo.


  ## Pieni yöllinen bakkanaali


  Koreografia: Atte Herd


  Tanssijat: Helmi Järvensivu ja Laura Kallas


  Ääni ja valosuunnittelu: Antti Lindholm & Atte Herd


  Pukusuunnittelu: Kaija Maunula


  Juhlat päättyvät ja vieraat tekevät lähtöä. Kaksi nuorta livahtaa juhlasaliin jatkamaan omia juhliaan. Koluttuaan läpi pitopöydän he löytävät kuitenkin jotain odottamatonta, jotain mikä saa tilanteen muuttumaan. Tunteet ja himo ottavat vallan. Pysyykö tunnelma kepeänä vai viekö kilpailuhenkisyys mennessään?


  ## Teatteriduo Glasumoi esittää – Mies ja banjisti


  Koreografia: Laura Kallas


  Tanssijat: Antti Lindholm ja Atte Herd


  Ääni ja valosuunnittelu: Antti Lindholm


  Pukusuunnittelu: Kaija Maunula


  Tämä on tarina rohkeudesta. Tämä on tarina uskosta ja luottamuksesta. Tämä on tarina veljeydestä mutta ei tasa-arvosta, vapaudesta puhumattakaan. Tämä on tarina kahdesta miehestä,  joita sattumat ja yhteinen unelma on kuljettanut johdattaen heidät tähän hetkeen, Järvenpää-talon intiimiin kellariteatteriin vuonna 1998. Tämä on tarina siitä kuinka Teatteriduo Glasumoi sai alkunsa, ja eritoten siitä, mikä on saanut heidät jatkamaan omalla tiellään vastoinkäymisistä huolimatta.


  ## Pelimannit


  Harmonikka: Henri Haakana


  Projisointi: Antti Lindholm


  Sävellys: Einojuhani Rautavaara


  Sovitus: Matti Rantala


  Pelimannit pohjautuu vanhoihin eteläpohjalaisiin pelimannisävelmiin, joiden pohjalta Rautavaara loi sarjan vapaita fantasioita säilyttäen niissä alkuperäisten kappaleiden mainiot, vanhakieliset otsikot. Teos on kuusiosainen.


  Närbölaisten braa speli – Saapuvat Närbön kuuluisat pelimannit, loistavana, maalaismahtavana kulkueena.


  Kopsin Joonas – Pohjolan kesäyön oudossa valossa soittelee Kopsin Joonas metsälle ja itselleen.


  Jacob Könni – Keskellä ihmeellisiä kellojaan ja koneitaan elää Jakob Könni, taituri, taiteilija, noita.


  Klockar Samuel Dickström – Kyläurkuri Samuel ”improviseeraa” yksinäisenä innoituksen hetkenä: pieni kirkko täyttyy hänen jokapäiväisen Bachinsa katkelmista, joihin sekoittuu vanhojen häätanssien muistumia.


  Pirun polska – Alakuloinen piru istuu kivellään kuunnellen synkkää, salaperäistä metsää.


  Hypyt – Hyppien ja loiskaten he pyörivät, leveät naamat juhlallisina kuin kirkossa, mutta merkillinen kiihko suurissa jaloissaan ja käsissään.


  ## Sillankorvan Paganini


  Avainviulu & Viulu: Valtteri Valo


  Brudmarch (trad.) – Harvinaisen hieno kappale avainviulun kotimaasta.


  Trädgårdsvalssen (trad.). – Toinen upea kappale avainviulun kotimaasta.


  Capricci n.5 (Niccolò Paganini) – Väitetään, että Niccolo Paganini ei itse olisi soittanut kaikkia kappaleitaan, vaan soitto olisi tullut itse paholaiselta. Olen vahvasti samaa mieltä…


  Capricci n.24 (Niccolo Paganini) – Teemaa legendaarisen Wilbur Hallin tyyliin varioiden.
long_text_en: >-
  ## The Spectator




  Choreography and dance: Anni Pilhjärta 




  Sound and lighting design: Antti Lindholm




  Costume design: Kaija Maunula




  The Spectator balances between being influenced and influencing, observing, experiencing, and watching—searching for a perspective. Does the gaze turn inward, or does the view open outward?




  “Those who experience do not participate in the world.” – Martin Buber




  ## A composition for one uncertain artist




  Choreography and dance: Helmi Järvensivu




  Sound and lighting design: Antti Lindholm




  Costume design: Kaija Maunula




  Beneath it all, just one uncertain artist. A work about uncertainty, a work about existence, a work about the awareness that someone is watching.




  ## A Small Nocturnal Bacchanal




  Choreography: Atte Herd




  Dancers: Helmi Järvensivu and Laura Kallas




  Sound and lighting design: Antti Lindholm & Atte Herd




  Costume design: Kaija Maunula




  The party ends and the guests begin to leave. Two young people sneak into the banquet hall to continue their own party. After rummaging through the buffet table, however, they find something unexpected—something that changes the situation. Emotions and desire take over. Will the mood remain lighthearted, or will competitiveness take over?


  ## Performed by the theater duo Glasumoi – The Man and the Banjo Player




  Choreography: Laura Kallas




  Dancers: Antti Lindholm and Atte Herd




  Sound and lighting design: Antti Lindholm




  Costume design: Kaija Maunula




  This is a story of courage. This is a story of faith and trust. This is a story of brotherhood, but not of equality, let alone freedom. This is a story of two men whom chance and a shared dream have carried, leading them to this moment in the intimate basement theater of Järvenpää House in 1998. This is the story of how the theater duo Glasumoi got its start, and especially of what has kept them going on their own path despite adversity.




  ## The Fiddlers




  Accordion: Henri Haakana




  Projection: Antti Lindholm




  Composition: Einojuhani Rautavaara




  Arrangement: Matti Rantala




  The Fiddlers is based on old South Ostrobothnian folk tunes, from which Rautavaara created a series of free fantasies while preserving the original pieces’ wonderful, archaic titles. The work consists of six parts.




  Närbölaisten braa speli – The famous folk musicians of Närbö arrive in a splendid, rustic procession.




  Kopsin Joonas – In the strange light of a Nordic summer night, Kopsin Joonas plays for the hunt and for himself.




  Jacob Könni – Amid his wondrous clocks and machines lives Jakob Könni, a master craftsman, artist, and sorcerer.




  Klockar Samuel Dickström – Village organist Samuel “improvises” in a solitary moment of inspiration: the small church fills with excerpts from his daily Bach, mixed with memories of old wedding dances.




  The Devil’s Polka – A melancholy devil sits on a rock, listening to the gloomy, mysterious forest.




  Jumps – Leaping and splashing, they spin, their broad faces solemn as if in church, yet with a strange fervor in their large feet and hands.




  ## Sillankorva’s Paganini




  Keyed Fiddle & Violin: Valtteri Valo




  Brudmarch (trad.) – A rare gem from the homeland of the keyed fiddle.




  Trädgårdsvalssen (trad.) – Another magnificent piece from the home of the keyed fiddle.




  Capriccio No. 5 (Niccolò Paganini) – It is claimed that Niccolò Paganini did not play all of his pieces himself, but that the playing came from the devil himself. I strongly agree…




  Capriccio No. 24 (Niccolò Paganini) – A variation on the theme in the style of the legendary Wilbur Hall.
