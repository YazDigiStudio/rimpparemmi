short_text_fi: Mitä tapahtuu, kun jää yksin ja kun mielikuvitus paikkaa kaverin?
  Ja kuinka kuitenkin ystävä voi poissa ollessaankin olla yhä läsnä?
short_text_en: What happens when you're alone and your imagination fills in for
  a friend? And how can a friend still be present even when they're not there?
long_text_fi: >-
  Mitä tapahtuu, kun jää yksin ja kun mielikuvitus paikkaa kaverin? Ja kuinka
  kuitenkin ystävä voi poissa ollessaankin olla yhä läsnä?


  Yksinäisen lapsen elämä saa yllättävän käänteen, kun lelulaatikosta hyppää vallaton tiikeri. Tylsältä tuntuneet leikit ja arkirutiinit muuttuvat tiikerin kanssa jännittäväksi temmellykseksi. Löyhästi Lassi ja Leevi -sarjakuvaan perustuva sympaattinen esitys toistaa sarjakuvamaisia piirteitä myös lavastuksessa.


  Koreografi Riku Immonen pitää nuoria katsojia arvossa ja osaa tehdä lapsille suunnattuja esityksiä raikkaalla otteella.
long_text_en: >-
  What happens when you’re left alone and your imagination steps in to fill the
  void? And how can a friend still be present even when they’re not there?




  A lonely child’s life takes a surprising turn when a mischievous tiger jumps out of the toy box. Playtime and daily routines that once felt boring turn into exciting adventures with the tiger. This charming production, loosely based on the Lassi and Leevi comic strip, also incorporates comic-book-style elements into its set design.




  Choreographer Riku Immonen respects young audiences and knows how to create performances for children with a fresh approach.
