# Production template — copy this file and rename it to the production id (slug).
# Files starting with _ are ignored by the content reader.
# All fields listed here; fill in what is available, leave others as "" or [].

id: "production-slug"          # unique, lowercase, hyphens only — used in URLs
title_fi: ""
title_en: ""
subtitle_fi: ""
subtitle_en: ""
status: active                 # active | archive
category: general              # general | children
premiere_date: ""              # YYYY-MM-DD

primary_image: ""              # web-optimised URL (Firebase Storage or /images/)

production_images: []
# production_images:
#   - src: ""                  # web-optimised URL for display
#     original_url: ""         # full-res original in Firebase Storage (for download)
#     caption_fi: ""
#     caption_en: ""
#     is_press: false          # true = also shown on Media page as downloadable press photo

short_text_fi: ""              # 1-2 sentences, shown on cards
short_text_en: ""

long_text_fi: ""               # full description — blank lines separate paragraphs
long_text_en: ""

info_fi: ""                    # credits, cast — one item per line
info_en: ""

additional_info_fi: ""         # co-productions, special notes
additional_info_en: ""

sort_order: 10                 # display order — lower number shown first (1, 2, 3...)

ticket_url_fallback: ""        # Netticket.fi or other ticketing URL

trailer_url: ""                # YouTube/Vimeo embed URL (youtube-nocookie.com recommended)

badge_fi: ""                   # short label for card corner — e.g. Lapsille, Koko perheelle
badge_en: ""

is_touring: false              # true = shown on Kiertueohjelmisto page

# ── Touring selling page only ─────────────────────────────────────────────────
# Shown on /kiertueohjelmisto/[id] — not visible on the regular programme page

duration_fi: ""                # e.g. "n. 45 min"
duration_en: ""                # e.g. "approx. 45 min"

age_recommendation_fi: ""      # e.g. "3–12 vuotta"
age_recommendation_en: ""      # e.g. "3–12 years"

technical_requirements_fi: "" # venue/stage requirements — one item per line
technical_requirements_en: ""

price_info_fi: ""              # fee + travel costs — free text, one item per line
price_info_en: ""

documentation_url: ""          # link to recording/video documentation
rider_url: ""                  # link to downloadable technical rider (PDF)
