long_text_fi: >-
  Fyysisen teatterin ja klovnerian taiturin Taina Mäki-Ison ohjauksessa
  Rimpparemmin omat komiikkakonsultit Hermann ja Mina esittelevät, kuinka
  viralliset naurudirektiivit toteutetaan asianmukaisella tavalla. He
  tarkastelevat ihan tosissaan niin toiston ja rytmin kuin myös ihmisen
  naurettavuuden herkkiäkin ulottuvuuksia. Kun on oikein totta niin epätoivokin
  voi näyttäytyä koomisena. Mikä meitä oikein naurattaa kompastelussa tai kun
  jotakuta sattuu? Ja miten niin toisia naurattaa, kun itse on oikein tosissaan?


  Naurettavaa tai sitten ihan kauhean totista näkökulmaa esityksen tuo myös se tosiasia, että Mäki-Iso on aitona ämpäripäänä Rimpparemmin muinaisia jäseniä. On siis mahdollista, että tämä koko homma menee ihan tanhupelleilyksi.


  Esityksen musiikki on saanut inspiraationsa balkan- ja klezmer-musiikista. Esityksessä kuultujen laulujen sanat ovat klovnien mielikuvituskieltä.


  Taina Mäki-Iso (FM)on fyysiseen teatteriin ja klovneriaan erikoistunut ohjaaja ja opettaja, joka työskentelee laajalti teatterin, tanssin, sirkuksen ja musiikin ammattilaisten, opiskelijoiden ja harrastajien kanssa. Mäki-Iso esiintyy myös klovnina ja hän on tehnyt useita sooloesityksiä esiintyen useilla festivaaleilla kotimaan lisäksi myös esimerkiksi Espanjassa, Tšekissä ja Arabiemiraatissa. Hän työskentelee myös sairaalaklovnina.


  Mäki-Iso on tehnyt ohjauksia sekä eri kaupunginteattereihin että vapaille ryhmille. Hänen viimeisimmät ohjaustyönsä ovat Vaasan kaupunginteatteriin Mäki-Iso&työryhmä:Rakkaus?!IIK!KÄÄK!YÄK! (2020, esitys oli Tampereen teatterikesän pääohjelmistossa 2021), Teatteri Eurooppa Neljän klovneriaesitys *Hannu ja Kerttu -vai meneekö kaikki ihan pipariksi?* (2020) ja klovneriaa ja nykytanssia yhdistävä *Muteco* (2019) tanssijoille Mari Kortelainen ja Kalle Pulkkinen.


  Mäki-Iso on arvostettu opettaja ja hän on opettanut mm. klovneriaa ja naamioilmaisua esimerkiksi Taideyliopiston Teatterikorkeakoulussa, Nätyllä, Turun taideakatemiassa ja Lahden sirkuskoulutuksessa. Hän itse on opiskellut klovneriaa ja komiikkaa opettajinaan mm. Philippe Gaulier, Giovanni Fusetti, Pierre Byland, Norman Taylor, Angela de Castro ja Ami Hattab.


  Mäki-Iso kirjoittaa parhaillaan klovneriasta ja tässä Rimpparemmin teoksessa hän käytännössä peilaa kirjoittamaansa.
long_text_en: >-
  Under the direction of Taina Mäki-Iso, a master of physical theater and
  clowning, Rimpparemmi’s own comedy consultants, Hermann and Mina, demonstrate
  how to properly implement the official laughter guidelines. They take a
  serious look at repetition and rhythm, as well as the more delicate aspects of
  human absurdity. When something is truly real, even despair can appear
  comical. What exactly makes us laugh when someone stumbles or gets hurt? And
  how is it that others find it funny when we ourselves are completely serious?


  The performance also takes a perspective that is either ridiculous or terribly serious, given the fact that Mäki-Iso is a genuine oddball among Rimpparemmi’s older members. So it’s possible that this whole thing will turn into a complete farce.


  The music in the performance draws inspiration from Balkan and klezmer music. The lyrics of the songs heard in the performance are in the clowns’ imaginary language.


  Taina Mäki-Iso (B.A.) is a director and teacher specializing in physical theater and clowning who works extensively with professionals, students, and amateurs in theater, dance, circus, and music. Mäki-Iso also performs as a clown and has created several solo performances, appearing at numerous festivals both in Finland and abroad, including in Spain, the Czech Republic, and the United Arab Emirates. She also works as a hospital clown.


  Mäki-Iso has directed productions for both municipal theaters and independent groups. His most recent directing projects include Mäki-Iso & Working Group: Love?! IIK! KÄÄK! YÄK! (2020, the production was part of the main program of the Tampere Theater Summer 2021), Teatteri Eurooppa Neljä’s clown show Hannu ja Kerttu -vai meneekö kaikki ihan pipariksi? (2020), and Muteco (2019), a production combining clowning and contemporary dance for dancers Mari Kortelainen and Kalle Pulkkinen.


  Mäki-Iso is a highly regarded teacher and has taught clowning and facial expression at institutions such as the University of the Arts Helsinki’s Theater Academy, Näty, the Turku Academy of Arts, and the Lahti Circus School. She herself has studied clowning and comedy under teachers such as Philippe Gaulier, Giovanni Fusetti, Pierre Byland, Norman Taylor, Angela de Castro, and Ami Hattab.


  Mäki-Iso is currently writing about clowning, and in this Rimpparemmi production, she essentially reflects on what she has written.
