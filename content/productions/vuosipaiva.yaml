long_text_fi: >-
  Joka vuosi kaksoset valmistautuvat juhlimaan erään poissaolevan syntymäpäivää.
  Juuttuneina omiin mietiskelyihinsä, yksinäisinä, lapsettomina ja
  tarpeettomina, maailman syrjällä he jakavat tappionsa. Huolimatta synkkiin
  ajatuksiin vaipumisista he pysyvät optimisteina ja odottavat yhä pientä
  kipinää, joka valaisee hetkeksi hauraan onnen pimeydessä.


  Tämä fyysisen komedian tragedia on osa martiniquelaisen nykynäytelmäkirjailijan Alfred Alexandren trilogiaa, joka käsittelee poissaolevaa henkilöä.


  Näyttämöllä nähdään Kallo ja Rinta-Opas aka Kylmä ja Kalma, jotka syntyivät vuonna 2000 Q-teatterin Lumotussa Saaressa.


  Esityksen pääkieli on fyysinen teatteri, mutta klovnerian ja tragedian summanmutikassa saattaa vilahtaa eri kieliä esimerkiksi ranskaa ja englantia suomen lisäksi.


   


  Esitys saa maailman ensi-iltansa Rovaniemellä Kulttuuritalo Wiljamissa osana Rimpparemmin vierailunäyttämöä. Ensimmäinen ranskankielinen versio vieraili Les Tréteaux du Maroni festivaaleilla Ranskan Guayanassa huhtikuussa 2024.


