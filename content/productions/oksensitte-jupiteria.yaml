long_text_fi: >-
  Oksensitte Jupiteria muljauttaa kunnianhimoisesti ja hauskasti käsityksesi
  näyttämötaiteesta. Esitys on piilotajunnassa liikkuva live-runoteos, jonka
  koreografi Elina Pirinen on luonut Tanssiteatteri Rimpparemmille.


  Teos rakentuu tarkasti tyylitellystä puhevyörystä, jonka Pirinen on estetisoinut ja paisuttanut esiintyjien henkilökohtaisten tekstien pienistä yksityiskohdista. Totuuden ja fantasian välillä liikkuvaa tekstimassaa voimistaa kauneudessaan kuvataiteellinen valopinta ja livenä kuultava klassinen pianomusiikki. Avaimena Jupiterin ytimeen ei ole tarkastella, mitä se on taidemuotona vaan, mitä jännittävyyksiä tapahtuu sisuskaluissasi kohdatessasi tämän esityksen. 


  Pirisen lähtökohtana teokselle on ollut palauttaa tanssitaiteen näyttämölle ihmisyys etäisen ruumiillisuuden sijaan. Hän villitsee käsityksiä koreografiasta, tanssista, liikkeestä ja teatterista hyödyntämällä kielen ja äänen virtaa ja oikkuja.



  Elina Pirinen (s. 1981) on yksi kansainvälisesti kiinnostavimmista suomalaisista koreografeista. Visionäärisen Pirisen ihanteena on ajattelun virtuositeetti, kohtuuttomat ratkaisut näyttämöllä ja pimeä huumori. Hänet on palkittu mm. Kritiikin kannukset -palkinnolla 2014 sekä eurooppalaisen koreografian pääpalkinnolla Prix Jardin d’Europe 2015.


  Esityksen kesto n. 45 min
long_text_en: >-
  Oksensitte Jupiteria ambitiously and playfully subverts your notions of the
  performing arts. The performance is a live poetic work that navigates the
  subconscious, created by choreographer Elina Pirinen for Dance Theater
  Rimpparemmi.




  The work is built from a meticulously stylized torrent of speech, which Pirinen has aestheticized and amplified from the small details of the performers’ personal texts. The mass of text, which moves between truth and fantasy, is enhanced in its beauty by a visual light surface and classical piano music performed live. The key to the core of Jupiter is not to examine what it is as an art form, but rather what thrills occur within you when you encounter this performance. 




  Pirinen’s starting point for the work has been to restore humanity to the stage of dance art instead of distant physicality. She challenges perceptions of choreography, dance, movement, and theater by utilizing the flow and quirks of language and sound.






  Elina Pirinen (b. 1981) is one of the most internationally intriguing Finnish choreographers. The visionary Pirinen’s ideals include intellectual virtuosity, outrageous solutions on stage, and dark humor. She has been awarded, among others, the Kritiikin kannukset Prize in 2014 and the Prix Jardin d’Europe, the main prize for European choreography, in 2015.




  Performance duration approx. 45 min
