short_text_fi: Monologi-esityksessä hän käy läpi muistojaan ukista, heidän
  kohtaamisista. Pieni poika ei aina ymmärtänyt, miksi ukki oli hiljainen, jopa
  pelokas. Miksi ukilla oli veitsisarja kuistin kaiteella? Miten muistot
  näyttäytyvät nyt aikuisena? Eri sukupolvien kokemuksia käydään läpi tässä
  herkässä tekstissä, antaen ymmärrystä ja toivoa.
short_text_en: In this monologue performance, he recounts his memories of his
  grandfather and their encounters. As a little boy, he didn’t always understand
  why his grandfathers were quiet, even fearful. Why did they keep a set of
  knives on the porch railing? How do those memories appear to him now as an
  adult? The experiences of different generations are explored in this sensitive
  text, offering understanding and hope.
