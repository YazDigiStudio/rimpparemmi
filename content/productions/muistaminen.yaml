short_text_fi: Monologi-esityksessä hän käy läpi muistojaan ukista, heidän
  kohtaamisista. Pieni poika ei aina ymmärtänyt, miksi ukki oli hiljainen, jopa
  pelokas. Miksi ukilla oli veitsisarja kuistin kaiteella? Miten muistot
  näyttäytyvät nyt aikuisena? Eri sukupolvien kokemuksia käydään läpi tässä
  herkässä tekstissä, antaen ymmärrystä ja toivoa.
short_text_en: In this monologue performance, he recounts his memories of his
  grandfather and their encounters. As a little boy, he didn’t always understand
  why his grandfathers were quiet, even fearful. Why did they keep a set of
  knives on the porch railing? How do those memories appear to him now as an
  adult? The experiences of different generations are explored in this sensitive
  text, offering understanding and hope.
long_text_fi: >-
  “ Ukki oli mulle aina tietynlainen, vähän hassu omissa oloissaan, omassa
  maailmassaan. Omituisia tapoja. Se oli kummallinen. Silti siinä oli jotain, se
  oli kuitenkin… se oli kuitenkin lämpöä täynnä. “ muistelee aikuinen Joni.


  Monologi-esityksessä hän käy läpi muistojaan ukista, heidän kohtaamisista. Pieni poika ei aina ymmärtänyt, miksi ukki oli hiljainen, jopa pelokas. Miksi ukilla oli veitsisarja kuistin kaiteella? Miten muistot näyttäytyvät nyt aikuisena? Eri sukupolvien kokemuksia käydään läpi tässä herkässä tekstissä, antaen ymmärrystä ja toivoa.
long_text_en: >-
  “Grandpa was always a certain kind of person to me — a bit odd, in his own
  world, doing his own thing. He had strange habits. He was peculiar. And yet,
  there was something… he was, after all… full of warmth,” recalls Joni as an
  adult.


  In this monologue performance, he recounts his memories of his grandfather and their encounters. As a little boy, he didn’t always understand why his grandfathers were quiet, even fearful. Why did they keep a set of knives on the porch railing? How do those memories appear to him now as an adult? The experiences of different generations are explored in this sensitive text, offering understanding and hope.
