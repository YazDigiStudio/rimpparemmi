short_text_fi: Häkkipolkka on kuvaus kaiken tuhonneen ekokatastrofin jälkeisestä
  elämästä. Jäljelle on jäänyt kuusi ihmistä, jotka elävät eristyksissä muusta
  maailmasta.
short_text_en: Caged polka is a depiction of life in the aftermath of an
  ecological disaster that has destroyed everything. Six people remain, living
  in isolation from the rest of the world.
long_text_fi: Häkkipolkka on kuvaus kaiken tuhonneen ekokatastrofin jälkeisestä
  elämästä. Jäljelle on jäänyt kuusi ihmistä, jotka elävät eristyksissä muusta
  maailmasta. Purkaakseen ahdistustaan ja tehdäkseen elämästään mielekkäämpää he
  alkavat tanssia ja laulaa. Heille muotoutuu oma erityinen kulttuurinsa, johon
  jokainen tuo kaiken näkemänsä ja kokemansa.
long_text_en: Caged polka is a depiction of life in the aftermath of an
  ecological disaster that has destroyed everything. Six people remain, living
  in isolation from the rest of the world. To relieve their anxiety and make
  their lives more meaningful, they begin to dance and sing. They develop their
  own unique culture, to which each person contributes everything they have seen
  and experienced.
