long_text_fi: >-
  ## Remmi Liveklubi – M


  M artistinimen takaan löytyy kuhmolaissyntyinen laulaja-lauluntekijä ja näyttelijä [Minja Koski](https://m-official.fi/). Viisi julkaistua albumia ovat poikineet muun muassa ehdokkuudet Emma- ja Teosto-palkinnoissa sekä keikkoja tärkeimmillä kotimaisilla festivaaleilla. Omien laulujensa lisäksi M ihastutti levyttämällä vuonna 2022 Lauluja 1960-luvulta -albumin, joka sisältää rakastettuja iskelmäklassikoja.Koski oli myös yksi säveltäjä Kaj Chydeniuksen luottolaulajista. Yli viisitoista vuotta kestänyt yhteistyö pitää sisällään useita konserttikokonaisuuksia sekä äänitteitä.Perjantaina 24.1.2025 Minja nousee [Kulttuuritalo Wiljamin](https://rimpparemmi.fi/esityskalenteri/kulttuuritalo-wiljami/) lavalle luottomuusikoidensa Miikka Ahlmanin, Aleksi Kaufmannin, Jussi-Pekka Parviaisen ja Simo Saukkolan kanssa. Keikalla kuullaan kappaleita jokaiselta M-albumilta.
long_text_en: >-
  ## Remmi Liveklubi – M


  Behind the stage name M is [Minja Koski](https://m-official.fi/), a singer-songwriter and actress born in Kuhmola. Her five released albums have earned her nominations for the Emma and Teosto Awards, as well as gigs at the most important domestic festivals. In addition to her own songs, M delighted fans by recording the album \*Songs from the 1960s\* in 2022, which features beloved pop classics.


  Koski was also one of composer Kaj Chydenius’s trusted singers. Their collaboration, which lasted over fifteen years, includes several concert series and recordings.


  On Friday, January 24, 2025, Minja will take the stage at [Kulttuuritalo Wiljami](https://rimpparemmi.fi/esityskalenteri/kulttuuritalo-wiljami/) alongside her trusted musicians Miikka Ahlman, Aleksi Kaufmann, Jussi-Pekka Parviainen, and Simo Saukkola. The concert will feature songs from every M album.
