short_text_fi: Sahara on hengästyttävän kiihkeä tanssiteos, joka kertoo
  ihmisistä ja heidän välisistä suhteistaan. Saharassa käydään valtataistelua,
  jonka aseina käytetään monenlaisia keinoja väkivallasta viettelyyn. Sahara
  hämmästyttää, järkyttää ja naurattaa.
short_text_en: Sahara is a breathtakingly intense dance piece that explores
  people and their relationships. In Sahara, a power struggle unfolds, with a
  wide range of tactics—from violence to seduction—used as weapons. Sahara
  amazes, shocks, and amuses.
