short_text_fi: >-
  Kiehtova ja moninainen tanssielokuva


  yhteistyössä Cinedance-Fest kiertuekuraattori Kati Kallio


  pe 18.11.2022 klo 19 Rimpparemmin esittävän taiteen klubi-illassa. Illan kesto n. 2,5h. Elokuvien jälkeen paneelikeskustelu Kati Kallion, Katja Gauriloffin, Kirsikka Paakkisen ja Janne Rosenvallin kanssa.
short_text_en: >-
  A captivating and multifaceted dance film


  in collaboration with Cinedance-Fest touring curator Kati Kallio


  Fri, Nov 18, 2022, at 7:00 p.m. at the Rimpparemmi performing arts club night. The evening lasts approx. 2.5 hours. Following the films, a panel discussion with Kati Kallio, Katja Gauriloff, Kirsikka Paakkinen, and Janne Rosenvall.
long_text_fi: >-
  Tanssielokuva on taidemuoto, joka yhdistää tanssia ja elokuvakerrontaa ja on
  yhtä laaja ja monimuotoinen kuin elokuva- tai tanssitaide. Sitä ei sido muoto
  tai genrerajat. Se on vahvojen taidemuotojen fuusio ja oma kehittyvä lajinsa.


  Tanssiteatteri Rimpparemmin vieraana marraskuussa on rovaniemeläissyntyinentanssitaiteilija ja elokuvantekijä Kati Kallio.Hän esittää Tanssin näyttämöllä tanssielokuvia niin kotimaasta kuin maailmalta. Kahden oman elokuvansa rinnalle Kati on valinnut kuusi lyhytelokuvaa, jotka edustavat hyvin moninaista ja rikasta tanssielokuvalajia. Elokuvanäytös on tuotu Rovaniemelle yhteistyössä arvostetun hollantilaisenCinedansFest -festivaalin kanssa, jonka kiertuekuraattorina Kati toimii.


  #### ILLAN TANSSIELOKUVAT


  KOJAMO

  FI, 2021, 5’40

  Ohjaus: Antti Ahokoivu

  Koreografia:  Taru Koski  ja Jukka Tarvainen


  EATNANVULOŠ LOTTIT – MAAN SISÄLLÄ LINNUT

  FI/NO, 2018, 10’00

  Ohjaus: Marja Helander

  Koreografia ja tanssi: Katja Haarla, Birit Haarla


  KÄY RINNALLAIN

  FI, 2021, 11’00

  Ohjaus ja koreografia: Kati Kallio


  SHADOW ANIMALS

  SW, 2017, 21’35

  Ohjaus: Jerry Carlsson

  Koreografia: Jerry Carlsson


  *TAUKO*


  HA HA HA

  FI, 2019, 8’42

  Ohjaus: Samuli Valkama

  Koreografia: Jyrki Karttunen


  TIME SUBJECTIVES IN OBJECTIVE TIME

  FI/RU, 2017, 5’46

  Ohjaus: Kati Kallio

  Koreografia: Anna Schekleina, Aleksandr Frolov


  FIBONACCI

  CZ, 2020, 8’ 13

  Ohjaus: Tomáš Hubáček

  Koreografia: Marie Gourdain


  DEAR TREE, PLEASE DON’T SPILL ON OUR GRAVE

  NL/SW, 2020, 15’07

  Ohjaus ja koreografia: Jonne Covers


  Näytös kokonaisuuden aloittaa Antti Ahokoivun ohjaama elokuva *Kojamo.* Elokuva on liikkeellinen kertomus kulkemisesta vastavirtaan ja paluumatkasta yläjuoksulle. Virtausta vastustavia hahmoja esittävät Jukka Tarvainen ja rovaniemeläissyntyinen Taru Koski, jotka molemmat ovat toimineet myös elokuvan koreografeina.


  Toisena elokuvana nähdään saamelaistaiteilija Marja Helanderin tanssielokuva *Eatnanvuloš Lottit – Maan sisällä linnut.* Elokuva tutkii saamelaisalueiden omistajuuden takana piileviä syvimpiä kysymyksiä. Elokuva palkittiin arvostetulla Risto Jarva -palkinnolla Tampereen elokuvajuhlilla vuonna 2018.


  Kati Kallion ohjaama ja koreografioima elokuva *Käy Rinnallain* on syntynyt Kyllikki Piiranhaastattelujen ja Elli Isokosken idean pohjalle. Elokuvalla halutaan tuoda esiin 94-vuotiaaksi eläneen Kyllikin näkökulmaa yksinäisyydestä. Elokuva nostaa esiin luopumisen ja yksinäisyyden teemat kertomalla pitkästä ystävyydestä ja kumppanuudesta.


  ”Kultaseni, kävele kunnolla”, sanoo Marallin vanhemmat hänelle, kun he vievät hänet juhliin. Mutta mitä tarkoittaa käyttäytyä ”kunnolla”? Illan edetessä aikuisten käyttäytyminen on hänelle yhä outoa. Ja onko hän ainoa, joka huomaa oudon varjon? Ruotsalaisen Jerry Carlssonin ohjaama ja koreografioima lyhytelokuva *Shadow Animals* onnistuu kietomaan katsojan omituisen tapahtumasarjan keskelle pienen Marallin näkökulmasta. Elokuva voitti Cinedans Festivaalilla pääpalkinnon vuonna 2021. Elokuva on ruotsinkielinen, englannin tekstityksellä.


  TAUKO


  Samuli Valkaman ohjaama ja Jyrki Karttusen koreografioima pirskahteleva tanssielokuva *Ha ha ha* kertoo tehokkaasta tehtaasta, jossa työntekijät purkittavat massatuotantona kolkkoa naurua. Eräänä päivänä oikea, vapaa nauru kuitenkin karkaa valvonnan ohi maailmalle. Elokuvan pääroolissa nähdään hurmaava Heidi Naakka.


  Tauon jälkeen toisena nähdään Kati Kallion ohjaama, meditatiivinen, eri aika kerroksiin nivottu lyhytelokuva *Time Subjectives in Objective Time*. Yhtistyössä Jekaterinburgilaisen ZONK’A ryhmän kanssa toteutettu tanssielokuva on kiertänyt laajasti kansainvälisesti, elokuva on mm. valittu Clermont-Ferrand lyhytelokuva festivaalille 21 ja saanut Production Prize palkinnon CINEMATECA festivaalilla 2020 Italiassa.


  Tsekkiläisten Tomáš Hubáčekin ja Marie Gourdainin teos *Fibonacci* on kuin ‘ympäristötanssielokuva’ tai audiovisuaalinen meditaatio. Elokuvan rakenne ja sisältö ottaa inspiraationsa kuuluisasta Fibonacci-numerosarjasta, joka liitetään myös ‘kultaiseen leikkaukseen’. Visuaalisesti silmää hivelevän elokuvan teossa on pyritty ottamaan nämä kaksi käsitettä mukaan jokaisessa sen osa-alueessa.


  *Dear Tree, Please Don’t Spill on Our Grave*, kertoo lyhyesti tarinaa ihmiskunnan historiasta. Elokuva alkaa hieman kuivahkosta yrityksestä selvittää “Miten päädyimme tähän?” -tilanteesta, joka johtaa vain lisäkysymyksiin “Mikä tuo on? ja “Miksi Anna asuu vessassa?”. Nerokas ja rohkea elokuva on muodoltaan ja kerronnaltaan erittäin kiinnostava ja raikas. Se kertoo seikkailunhaluisesta Annasta, joka pystyy vahingossa heittää itsensä yllätysjuhliin. Elokuva on hollantilaisen tanssitaiteilija Jonne Coversin maisteriopintojen päättötyö *Göteborgin Contemporary Performative Arts*koulusta 2021. Elokuvassa on englanninkielinen puhe ja tekstitys.


  ### Kati Kallio


  Tanssitaiteen maisteri Kati Kallio on elokuvantekijä ja Suomen johtava tanssielokuvan asiantuntija, joka on urallaan toiminut laaja-alaisesti tanssitaiteen parissa. Hänen taiteellinen työ on vuodesta 2008 lähtien keskittynyt tanssielokuvaan. Hän on valmistanut 18 lyhytelokuvaa, joita on esitetty useilla kansainvälisillä festivaaleilla ja televisioissa. Asiantuntijana hän vastaanottaa vuosittain useita kansainvälisiä kutsuja kuratoijana, tuomariston jäsenenä ja työpajojen ohjaajana. Kallio on tanssiryhmä Myrskyryhmässä työskennellessään kehittänyt osallistavan tanssielokuvan metodeja vuodesta 2010 lähtien. Myrskyryhmän tuotantona on valmistunut kahdeksan lyhytelokuvaa yhteistyössä ikäihmisen kanssa.


  Kallio on suomalaisen tanssielokuvan edistäjä ja pioneeri, joka on työskennellyt Loikka Kontakti ry:ssä kotimaisen tanssielokuvan aseman parantamiseksi vuosina 2008-2018. Vuosina 2008-2014 Kallio vastasi tanssielokuvan yleisötyöstä ja kehitti muun muassa työpajakonsepteja lasten ja nuorten parissa tehtävään kasvatustyöhön. Hänen taiteellinen johtajuus kautensa oli 2015-2018.


  *” Minulle tanssielokuva on taidemuoto, joka yhdistää tanssia ja elokuvakerrontaa ja on yhtä laaja ja monimuotoinen kuin elokuva- tai tanssitaide. Sitä ei sido muoto tai genrerajat. Se on vahvojen taidemuotojen fuusio ja oma kehittyvä lajinsa.*


  *Tanssielokuvan ilmaisu lähtee kehosta, liikkeestä ja toiminnosta. Keskiöön nousee kehosta lähtevä ‘ajattelu’ ja liikkuvan kuvan yhdistäminen. Toimiva keho ei käsitteistä, vaan se aistii, tuntee, toimii ja on välittömässä kontaktissa toiseen. Kehon ‘kieli’ on paljastava, tunteita ja tunnetiloja välittävä. Olen kiinnostunut kehollisen ja sanattoman ilmaisun hyödyntämisestä elokuvassa. Tai toisin päin ilmaistuna, haluan hyödyntää elokuvallista ilmaisua tanssitaiteessa. Tanssi tuo elokuvakerrontaan moninaisen ja tunteisiin vahvasti sitoutuneen ilmaisun, joka läpäisee kielimuurit. Tanssiesitys on hetken taidetta. Se esitetään ja sen jälkeen sitä ei enää samanlaisena ole olemassa. Kamera tallentaa hetken ja elokuva muotoinen teos jää konkreettisesti olemaan. Elokuva on laajasti tunnettu taidemuoto ja sen mahdollisuudet levitä maailmanlaajuisesti tarjoaa alustan nähdyksi tulemiselle. Elokuvan äärelle voi palata kohtuullisen vaivattomasti uudestaan.*


  *Haluan aiheuttaa katsojassa kineettisiä tuntemuksia, liikuttaa tunteita, saada ihmiset kiinnostumaan sanattomasta viestinnästä. Olen tarinankertoja, jota ajaa asioiden ja ilmiöiden näkyväksi tekemisen tarve sekä viestin välittäminen. Elokuvieni aiheet syntyvät inhimillisistä ja arkisista teemoista, kuten riippuvuudesta irti pääsemisestä tai omien haasteiden voittamisesta. Useimmat elokuvani ovat syntyneet vahvassa yhteistyössä niin elokuva-alan ammattilaisten kuin tanssin amatöörien kanssa, jossa isossa roolissa on ollut jaettu käsikirjoitusprosessi. ”* 26.lokakuuta 2021 Kati Kallio


  #### Yhteistyössä


