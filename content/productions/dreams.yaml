short_text_fi: Dreams on kolmen lyhyen tanssiesityksen yhteisilta. Kaikki
  koreografiat ovat uusia ja niistä vastaavat Tanssiteatteri Rimpparemmin
  taiteellinen johtaja Matti Paloniemi, helsinkiläinen Mikko Orpana ja
  rovaniemeläinen Marjo Selin.
short_text_en: Dreams is a program featuring three short dance performances. All
  of the choreographies are new and were created by Matti Paloniemi, artistic
  director of Dance Theater Rimpparemmi; Mikko Orpana from Helsinki; and Marjo
  Selin from Rovaniemi.
long_text_fi: >-
  ## Bad Company


  **Koreografia** Mikko Orpana

  **Äänisuunnittelu** Antti Mäkelä

  **Valosuunnittelu** Jukka Laukkanen

  **Pukusuunnittelu** Kaija Maunula

  **Tanssijat** Atte Herd, Helmi Järvensivu, Jarmo Lind ja Anni Pilhjärta

  **Muusikko** Henri Haakana


  Bad Company-firman käytävillä voi kuulla tukahtuneiden yksinpuheluiden kaikuvan kopiokoneiden säestämänä. Jossain marketing director ja project manager ottavat rajusti yhteen. Kilpailu on raakaa ja seura huonoa. Liikkeessä on pysyttävä säilyäkseen hengissä.


  Tässä firmassa ei ylennyksiä jaeta toverihengen perusteella. Oma paikkasi sinun on ansaittava ja kalenterisi raivattava turhista sosiaalisista kanssakäymisistä. Olkoon suurin haaveesi täydellinen kyynärpäätaktiikka ja niskan päälle pääseminen. Silloin tiesi on auki CEO:n paikkaa myöten.


  ## LaBOratorio


  **Koreografia** Marjo Selin

  **Valosuunnittelu** Jukka Laukkanen

  **Pukusuunnittelu** Kaija Maunula

  **Tanssija** Anni Pilhjärta

  **Muusikko** Valtteri Valo


  LaBOratorio on juhlavan maallinen teos kahdelle taiteilijalle, viulistille ja tanssijalle. Teos tarkkailee ihmisen pyrkimyksiä yhteensovittamalla askelia, eleitä ja asentoja.


  Askel kuljettaa. Ele viestii. Asento pysähtyy. Minne, mitä, miksi?


  Voiko tämän kaiken sulattaa… onko se vain unelmaa?


  ## 

  Sarabande


  **Koreografia** Matti Paloniemi

  **Sävellys** Jouko Pääkkönen

  **Valosuunnittelu** Jukka Laukkanen

  **Pukusuunnittelu** Kaija Maunula

  **Tanssijat** Atte Herd, Helmi Järvensivu ja Jarmo Lind

  **Muusikot** Henri Haakana ja Valtteri Valo


  ”Bändi pystyyn, hyvä biitti, makeet kuteet ja se on siinä. Sä oot niin hyvännäkönen, et ei sun muuta tartte tehdä. Nopeesti julkisuuteen. That´s it.” –Max Cash


  Popbändi Sarabande haaveilee menestyksestä ja odottaa treenisalissa läpimurtoaan. Mikä ajaa Sarabandea kohti unelmaansa?


  Sarabande-termi viittaa hitaaseen kolmijakoiseen tanssiin, joka tuomittiin 1500-luvulla Espanjassa säädyttömäksi. Säveltäjä Christoph Nichelmann kuvaili sarabandea vuonna 1755 sanomalla:

  ”Sarabanden luonne velvoittaa säveltäjän luomaan sellaisia harmonioita, jotka kohottavat kuulijan mielentilaa ja herättävät hänessä ihastusta ja kunnioitusta.”
long_text_en: >-
  **Bad Company**




  Choreography by Mikko Orpana


  Sound design by Antti Mäkelä


  Lighting design by Jukka Laukkanen


  Costume design by Kaija Maunula


  Dancers: Atte Herd, Helmi Järvensivu, Jarmo Lind, and Anni Pilhjärta


  Musician: Henri Haakana




  In the hallways of Bad Company, you can hear muffled monologues echoing, accompanied by the hum of photocopiers. Somewhere, the marketing director and project manager are having a heated argument. Competition is fierce and the atmosphere is toxic. You have to keep moving to survive.




  In this company, promotions aren’t handed out based on camaraderie. You have to earn your place and clear your calendar of unnecessary social engagements. Let your greatest ambition be perfect elbow tactics and getting the upper hand. Then the path is open all the way to the CEO’s seat.




  **LaBOratorio**




  Choreography by Marjo Selin


  Lighting design by Jukka Laukkanen


  Costume design by Kaija Maunula


  Dancer: Anni Pilhjärta


  Musician: Valtteri Valo




  LaBOratorio is a festive, earthly work for two artists: a violinist and a dancer. The work observes human endeavors by coordinating steps, gestures, and postures.




  A step carries us forward. A gesture communicates. A posture pauses. Where, what, why?




  Can all of this be assimilated… or is it just a dream?




  **Sarabande**




  Choreography by Matti Paloniemi


  Music by Jouko Pääkkönen


  Lighting design by Jukka Laukkanen


  Costume design by Kaija Maunula


  Dancers: Atte Herd, Helmi Järvensivu, and Jarmo Lind


  Musicians: Henri Haakana and Valtteri Valo




  “Put together a band, a good beat, cool outfits, and that’s it. You’re so good-looking, you don’t need to do anything else. Quickly into the spotlight. That’s it.” –Max Cash




  The pop band Sarabande dreams of success and waits in the rehearsal room for their breakthrough. What drives Sarabande toward their dream?




  The term “sarabande” refers to a slow, triple-meter dance that was deemed indecent in 16th-century Spain. Composer Christoph Nichelmann described the sarabande in 1755, saying:


  “The nature of the sarabande compels the composer to create harmonies that elevate the listener’s mood and inspire in them admiration and respect.”
