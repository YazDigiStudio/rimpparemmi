short_text_fi: Monien vastaanottamieni laulutekstilähetysten joukosta oli
  sukeltanut esiin ainutlaatuinen kokonaisuus, II maailmansodan jälkeisen Lapin
  savottaelämän kuvaus, jonka jokainen numero tuntui huutavan musiikillista
  kommenttia.
short_text_en: "Among the many song lyrics I had received, one unique collection
  stood out: a depiction of life in the logging camps of post-World War II
  Lapland, where every verse seemed to cry out for a musical interpretation."
long_text_fi: >-
  Ahti Taponen haastatteli Lapin jätkiä 1980-luvulla ja riimitteli
  haastattelujen pohjalta sanoituksia. Ne hän lähetti Kaj Chydeniukselle, joka
  kertoo siitä näin: ”Monien vastaanottamieni laulutekstilähetysten joukosta oli
  sukeltanut esiin ainutlaatuinen kokonaisuus, II maailmansodan jälkeisen Lapin
  savottaelämän kuvaus, jonka jokainen numero tuntui huutavan musiikillista
  kommenttia. Rehevä, maanläheinen, hulvattoman rento, mutta samaan aikaan
  tuskaisen kipeä, ehdottoman ”proletaarinen”, ja rehdisti, ylpeästikin
  suomalainen, hämmästyttävä lupaus.”


  Markku Köngäs löysi Jätkän balladista läpileikkauksen erään aikakauden lopusta. 1960-luvulla alkoi yhteiskunnallinen murros, jätkäkulttuurin häviäminen ja suuri muuttoliike työn perässä Ruotsiin. Lauluissa on jätkän näkökulma siihen kaikkeen: lappilaisen työmiehen tarinat, naisen ikävä, viinan tuoma unohdus.
long_text_en: >-
  Ahti Taponen interviewed the lads of Lapland in the 1980s and wrote lyrics
  based on those interviews. He sent them to Kaj Chydenius, who describes it
  this way: “Among the many song lyrics I received, a unique collection had
  emerged—a depiction of post-World War II Lapland’s logging life, where every
  line seemed to cry out for a musical commentary. Lush, down-to-earth,
  hilariously laid-back, yet at the same time painfully poignant, unquestionably
  ‘proletarian,’ and honestly, even proudly Finnish—an astonishing promise.”




  Markku Köngäs found in Jätkä’s Ballad a cross-section of the end of an era. The 1960s saw the beginning of social upheaval, the decline of “jätkä” culture, and a massive migration to Sweden in search of work. The songs offer a “jätkä’s” perspective on it all: the stories of a Lapland laborer, longing for a woman, and the oblivion brought by alcohol.
