long_text_fi: >-
  S T R E A M on kohtaukseton, tarinaton paluu kehon äärelle informaation
  aikakaudella. Viiden tanssijan nykytanssiteos käyttää arjessa tutuksi tullutta
  reaaliaikaista videokuvausta tuodakseen tanssin yksityiskohdat lähemmäs kuin
  koskaan. Kamera poimii liikkeen keskeltä paljaalle silmälle paljastumattomia
  yksityiskohtia yksittäisestä hikipisarasta pieneen kosketukseen. Taidokkaan
  ryhmän virtaavan liikkeen keskeltä paljastuu rinnakkainen, pienten hetkien
  maailma.


  Itse itselleen live-striimin kautta rinnakkaismaailman luova teos on ajankuva ihmisestä maailmassa, jonka arjessa teknologia korvaa sanan. Videotaiteen ja nykytanssin keinoin teos hakee mahdollisuutta kokea informaatiotulva esteettisenä – muodostaa luontosuhde virtuaaliseen.


  ”Tämä on liikkeeseen keskittyvä tanssiteos viidelle tanssijalle. Hikinen, koruton ja tarinaton. Esiintyjät ovat kokeineita tanssinalan ammattilaisia – heiltä teos vaatii monenlaisia taitoja, erityisesti ryhmän kontaktissa tapahtuvaa vauhdin, etäisyyden ja ajoituksen tajua. Ainoa lavastuksellinen elementti on videoprojisointi, joka näyttää realiaikaisesti näyttämötapahtumaa eri kulmista ja etäisyyksistä käsin.


  Toivon, että teos on sopiva yhtä lailla sekä ensimmäistä kertaa nykytanssia katsovalle että taiteenlajiin pitkään syventyneelle. Teoksessa ei ole minulle itselleni mitään erityistä pääteltävää, ymmärrettävää tai oivallettavaa sanomaa tai taustaa. Uskon, että teosta voi arvostaa silkan liikkeen sommittelun, näyttävyyden ja taidon kautta. Itse toivon sen olevan kuitenkin katsojalleen ensisijaisesti liikkeeseen tuudittava kokemus, samalla tavalla rauhoittava kuin luontomaisema tai abstrakti maalaus.”


   – Iiro Näkki, koreografi
long_text_en: >-
  S T R E A M is a scene-less, plotless return to the body in the information
  age. This contemporary dance piece, featuring five dancers, uses real-time
  video footage—now a familiar part of everyday life—to bring the details of
  dance closer than ever before. The camera captures details in the midst of
  movement that are invisible to the naked eye—from a single drop of sweat to a
  slight touch. Amid the fluid movements of this skilled group, a parallel world
  of fleeting moments is revealed.




  This work, which creates a parallel world for itself through a live stream, is a snapshot of humanity in a world where technology has replaced the spoken word in everyday life. Using the tools of video art and contemporary dance, the work seeks to offer an opportunity to experience the flood of information as an aesthetic experience—forming a connection between the natural and the virtual.


  “This is a movement-focused dance piece for five dancers. Sweaty, unadorned, and without a narrative. The performers are experienced dance professionals—the piece demands a wide range of skills from them, particularly an understanding of momentum, distance, and timing within the group’s interactions. The only scenographic element is a video projection that shows the stage action in real time from different angles and distances.




  I hope the piece is equally suitable for both those seeing contemporary dance for the first time and those who have long been immersed in the art form. For me personally, there is no specific message or background to be deduced, understood, or realized in the piece. I believe the piece can be appreciated simply through the composition, spectacle, and skill of the movement. Personally, however, I hope it will be, first and foremost, an experience that lulls the viewer into the movement—as soothing as a natural landscape or an abstract painting.” 


  – Iiro Näkki, choreographer
