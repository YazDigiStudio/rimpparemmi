short_text_en: Me and the Moon is a dance theater production for the whole
  family, brought to life by song, music, and the narrator’s stories, in which a
  cast of increasingly eccentric characters set their sights on the moon.
long_text_fi: >-
  Minä ja kuu on laulun, soiton ja kertojan tarinoiden siivittämä koko perheen
  tanssiteatteriteos, jossa toinen toistaan erikoisemmat hahmot ottavat
  määränpääkseen kuun. Teos ottaa katsojankin mukaan kuumatkalle, sillä matka
  kuuhun ei ole kiinni rahasta tai raketeista vaan mielikuvituksesta.


  Minä ja Kuu -esityksessä seikkailevat muun muassa herra Maailmankaikkeus, pieni Xlthlx ja kapteeni Vhd Vhd. Minä ja kuu–teoksen teemana on yhteistyö, jota teoksen erikoiset hahmot tekevät näyttämön surrealistisessa avaruudessa.
long_text_en: >-
  Me and the Moon is a dance theater production for the whole family, brought to
  life by song, music, and the narrator’s stories, in which a cast of
  increasingly eccentric characters set their sights on the moon. The
  performance takes the audience on a journey to the moon as well, for this
  voyage depends not on money or rockets, but on imagination.




  Among the characters adventuring in the performance are Mr. Universe, little Xlthlx, and Captain Vhd Vhd. The theme of Me and the Moon is collaboration, which the work’s unique characters engage in within the surreal space of the stage.
