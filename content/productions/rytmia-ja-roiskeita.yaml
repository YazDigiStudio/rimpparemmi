short_text_fi: Uusi vuosi, uusi show – Rimpparemmin joulushow palaa entistäkin railakkaampana!
short_text_en: New year, new show – Rimpparemmi’s Christmas show is back, more
  lively than ever!
long_text_fi: >-
  Uusi vuosi, uusi show – Rimpparemmin joulushow palaa entistäkin
  railakkaampana!

  Jos rakastit *Aallon harjalla* -risteilyä, odota kun pääset mukaan *Rytmiä ja roiskeita* -matkalle. Ja jos viime vuosi jäi väliin, nyt on korkea aika hypätä kyytiin Rimpparemmin kuivanmaan risteilyelämykseen!


  M/S Rimpparemmi irrottaa köydet marras-joulukuussa 2025 Kulttuuritalo Wiljamin satamasta ja suuntaa kohti joulukauden huippuhetkiä. Luvassa on esitys, joka yhdistää taidokkuuden, revyymäisen riemun ja risteilybileiden villin sykkeen – tietenkin Rimpparemmin omaleimaiseen tyyliin.
long_text_en: >-
  New year, new show – Rimpparemmi’s Christmas show is back, more lively than
  ever!


  If you loved the *Aallon harjalla* cruise, just wait until you join the *Rytmiä ja roiskeita* voyage. And if you missed out last year, now is the perfect time to jump aboard Rimpparemmi’s land-based cruise experience!


  M/S Rimpparemmi will cast off from the port of Kulttuuritalo Wiljami in November–December 2025 and set sail toward the highlights of the Christmas season. You can look forward to a show that combines skill, revue-style joy, and the wild energy of a cruise party—all in Rimpparemmi’s signature style, of course.
