short_text_fi: Tässä aikuisille ja senioreille suunnatussa musiikkiesityksessä
  sukelletaan suomalaisen elokuvamusiikin maailmaan – siihen tunnelmaan, joka
  syntyy, kun sävelet jäävät soimaan korvamatona ja kohtaukset piirtyvät
