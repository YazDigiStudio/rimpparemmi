long_text_fi: >-
  Tässä aikuisille ja senioreille suunnatussa musiikkiesityksessä sukelletaan
  suomalaisen elokuvamusiikin maailmaan – siihen tunnelmaan, joka syntyy, kun
  sävelet jäävät soimaan korvamatona ja kohtaukset piirtyvät muistiin
  vuosikymmenten takaa. Lavalla heräävät eloon tuttuuden tunne ja nostalgian
  lämpö, kun kuullaan elokuvamusiikin helmiä eri vuosikymmeniltä.


  Ohjelmistossa kuullaan monipuolinen kattaus tunnelmia: mm. Akselin ja Elinan häävalssi, Seitsemän kertaa seitsemän, Tuomittuna kulkemaan. Jokainen kappale kantaa mukanaan palaansa suomalaisesta elokuvahistoriasta – hetkiä, joita ei unohdeta.


  Musiikin lomassa tehdään pieniä aikamatkoja itse elokuvien maailmaan – muistelemme tarinoita ja tunnelmia, joista nämä kappaleet ovat aikanaan syntyneet. Luvassa on siis musiikillinen elokuvahetki, jossa saa nauttia, muistaa ja ehkä vähän hyräilläkin mukana.
long_text_en: >-
  This musical performance, aimed at adults and seniors, takes you on a journey
  into the world of Finnish film music—into that atmosphere created when
  melodies linger in your ears and scenes from decades past come vividly to
  mind. On stage, a sense of familiarity and the warmth of nostalgia come to
  life as we hear gems of film music from different decades.


  The program features a diverse selection of moods, including: Akseli and Elina’s Wedding Waltz, Seven Times Seven, and Condemned to Wander. Each song carries a piece of Finnish film history—moments that will never be forgotten.


  Amidst the music, we’ll take brief trips back in time to the world of the films themselves—recalling the stories and moods that gave birth to these songs in their day. So, get ready for a musical cinematic moment where you can enjoy, reminisce, and maybe even hum along a little.
