long_text_fi: >-
  Looking for REIDAR on tanssiteatteria, draamaa ja esineteatteria yhdistelevä
  esitys joka käsittelee kuvataiteilija Reidar Särestöniemen elämää, työtä,
  identiteettiä ja imagoa.


  Särestöniemeen liittyvät myytit ja käsitykset jatkavat yhä elämäänsä ja niin tutkijat, toimittajat kuin kiinnostuneet kansalaisetkin kisaavat siitä kuka tunsi oikean Reidarin. Särmikäs kollaasi ei pyri olemaan elämäkerta tai muistomonumentti vaan väläyttelee mielikuvia Reidarin matkasta romanttisen taiteilijakuvan ja tietoisen brändin välillä.


  Rooli on rakennelma ja kiinnostuksen tae, mutta onko se ihmiselle suoja vai ansa?
long_text_en: >-
  Looking for REIDAR is a performance that combines dance theater, drama, and
  object theater, exploring the life, work, identity, and image of visual artist
  Reidar Särestöniemi.




  The myths and perceptions surrounding Särestöniemi continue to live on, and researchers, journalists, and interested members of the public alike compete to claim who knew the “real” Reidar. This edgy collage does not aim to be a biography or a memorial, but rather offers glimpses of Reidar’s journey between the romantic image of the artist and a conscious brand.




  A role is a construct and a guarantee of interest, but is it a shield or a trap for a person?
