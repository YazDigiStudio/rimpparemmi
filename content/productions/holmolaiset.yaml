long_text_fi: >-
  KomppaRemminNiemen kylään tupsahtaa eräänä päivänä neljä kulkijaa ja siitä se
  tohina alkaa! Uudet tulokkaat kummastuttavat erikoisilla tavoillaan ja
  tempauksillaan. Sepä kyläläisiä vasta ihmetyttääkin, kun Hölmöläiset
  onnistuvat päättömissä pyrkimyksissään. 


  Hölmöläiset on koko perheen esitys, joka perustuu tuttuihin kansantarinoihin.  


  Esityksen musiikin toteutuksessa on yhteistyössä Lapin kamariorkesterin puhallinkvintetti, joka nähtiin ensi-iltanäytöskaudella näyttämöllä yhdessä Rimpparemmin esiintyjien kanssa. Koreografiasta vastaa lastenkulttuurin valtionpalkinnon saanut Riku Immonen.
long_text_en: >-
  One day, four travelers show up in the village of KomppaRemminNiemi, and
  that’s when the commotion begins! The newcomers baffle everyone with their
  peculiar ways and antics. The villagers are truly amazed when the Fools
  succeed in their seemingly impossible endeavors. 


  The Fools is a show for the whole family, based on familiar folk tales.  


  The music for the show is performed in collaboration with the Lapland Chamber Orchestra’s wind quintet, which appeared on stage alongside the Rimpparemmi performers during the premiere season. The choreography is by Riku Immonen, recipient of the State Prize for Children’s Culture.
