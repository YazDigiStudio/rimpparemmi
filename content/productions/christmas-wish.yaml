short_text_fi: Mitä rakastunut tonttutyttö Jolie toivoo joululahjaksi? Koko
  perheen jouluesitys Christmas Wish vie katsojan mukanaan tonttujen kotiin
  kaukaiselle Korvatunturille.
short_text_en: What does Jolie, the elf girl in love, want for Christmas? The
  family Christmas show *Christmas Wish* takes the audience to the elves’ home
  in faraway Korvatunturi.
long_text_fi: Mitä rakastunut tonttutyttö Jolie toivoo joululahjaksi? Koko
  perheen jouluesitys Christmas Wish vie katsojan mukanaan tonttujen kotiin
  kaukaiselle Korvatunturille. Musiikki, liike ja vahva visuaalisuus välittävät
  joulun tärkeimmän sanoman, rakkauden, koko perheelle, kielestä riippumatta.
  Tunne joulun taika ja tapaa itse Joulupukki!
long_text_en: What does Jolie, the elf girl in love, wish for as a Christmas
  present? The family Christmas show \*Christmas Wish\* takes the audience to
  the elves’ home in faraway Korvatunturi. Music, movement, and striking visuals
  convey Christmas’s most important message—love—to the whole family, regardless
  of language. Feel the magic of Christmas and meet Santa Claus in person!
