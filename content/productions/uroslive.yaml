short_text_fi: Uros Live on tuokiokuvia uroiden maailmasta. Se on kuvia ja
  tunnelmia miehenä olemisesta ja olemattomuudesta.
short_text_en: Male Live offers snapshots of the world of men. It features
  images and reflections on what it means to be a man—and what it means not to
  be.
long_text_fi: >-
  Uros Live on tuokiokuvia uroiden maailmasta. Se on kuvia ja tunnelmia miehenä
  olemisesta ja olemattomuudesta. Mikä on mies? Mitkä ovat miehen monet roolit?
  Mies on yksi juridisista sukupuolista. Mitä muuta?


  Tämä teos pureutuu syvälle maskuliinisuuden monimutkaisuuteen ja siihen kuinka miehen rooli koetaan ja nähdään yhteiskunnassamme. Se korostaa sitä kuinka miehen rooli ei synny tyhjästä. Se ei ole pelkästään biologiaa tai “luonnollista” vaan se rakentuu odotuksista, ihmissuhteista sekä elämän kokemuksista.


  Tämä teos kertoo kuinka maskuliinisuus voi olla herkkää tai jopa kipeää mutta samalla täynnä ilon purskahduksia ja räimettä. Uros Live on ajatuksia herättävä katsaus miehen olemukseen ja siihen, kuinka normit muokkaavat käsitystä miehisyydestä.
long_text_en: >-
  Male Live offers snapshots of the world of men. It consists of images and
  impressions of what it means to be—and not to be—a man. What is a man? What
  are the many roles of a man? A man is one of the legal genders. What else?


  This work delves deeply into the complexity of masculinity and how the role of a man is experienced and perceived in our society. It highlights how a man’s role does not arise out of thin air. It is not merely biology or “natural,” but is built upon expectations, relationships, and life experiences.


  This work explores how masculinity can be sensitive or even painful, yet at the same time full of bursts of joy and exuberance. Uros Live is a thought-provoking look at the essence of being a man and how norms shape our understanding of masculinity.
