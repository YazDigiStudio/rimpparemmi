long_text_fi: >-
  Herkkua luvassa! Nuoret tekijät tuovat omia teoksiaan kulttuuritalo Wiljamin
  lavalle. Näytöksissä nähdään soolo- ja ryhmäteoksia jotka ovat kaikki
  opiskelijoiden itsensä luomia. Teoksia on paljon, ja kahtena päivänä
  nähdäänkin kaksi eri näytöstä. Joten varaathan paikkasi molempiin niin et jää
  mistään paitsi!


  **Näytöksen 1 sooloista vastaa:** Moona Örn, Juuso Vikström, Katariina Uimonen, Sandra Korvela, Petra Kostin, Merja Laine, Varvara Trubii ja Karri Kallas. **Ryhmäteosten koreografit ovat:** Ella Laitinen, Marina Podkidysheva, Ia Laiti ja Moona Hokkanen


  **Näytöksen 2 sooloista vastaa:** Ninni Räihä, Amy Sova, Kateryna Barska, Satu Kämäräinen ja Sini-Tuulia Norrbacka R**yhmäteosten koreografit ovat:** Eevi Grundström, Hilla Harju, Tsampika Malliakas, Mimmu Korvenpää, Emma Elomaa, Christopher Otieno ja Susanna Siira.


  Näytösten kesto n. 2h
long_text_en: >-
  A treat in store! Young artists will be bringing their own works to the stage
  at the Wiljami Cultural Center. The performances will feature solo and group
  pieces, all created by the students themselves. There are many pieces, and two
  different performances will be held over two days. So be sure to reserve your
  spot for both so you don’t miss a thing!


  **The soloists for Show 1 are:** Moona Örn, Juuso Vikström, Katariina Uimonen, Sandra Korvela, Petra Kostin, Merja Laine, Varvara Trubii, and Karri Kallas. **The choreographers for the group pieces are:** Ella Laitinen, Marina Podkidysheva, Ia Laiti, and Moona Hokkanen


  **The solos in show 2 are performed by**: Ninni Räihä, Amy Sova, Kateryna Barska, Satu Kämäräinen, and Sini-Tuulia Norrbacka.**The choreographers of the group pieces are:** Eevi Grundström, Hilla Harju, Tsampika Malliakas, Mimmu Korvenpää, Emma Elomaa, Christopher Otieno, and Susanna Siira.


  Performance duration: approx. 2 hours
