primary_image: https://firebasestorage.googleapis.com/v0/b/rimpparemmi-b3154.firebasestorage.app/o/cms%2Fweb%2F1773303027530-Liveklubi-Urkka-vaaka-17.-18.3.-2.webp?alt=media
short_text_fi: >-
  Lapin urheiluopiston tanssialan perustutkinnon opiskelijat valtaavat Remmi
  Liveklubin ja Kulttuuritalo Wiljamin lavan kahden näytöksen verran 17. ja
  18.3. klo 19. Luvassa on ytimekäs kattaus opiskelijoiden omia töitä sekä
  opettajien johdolla valmistettuja esityksiä . Näytökset kuuluvat
  opiskelijoiden opintoihin.


  Pystybaari Wiljami tarjoilee koko illan ajan. Voit nauttia alkoholittomat juomasi myös katsomon puolella. Ovet, lipunmyynti sekä Pystybaari-Wiljami aukeavat tunti ennen klubia.
short_text_en: >-
  Students of the dance program at Lapland Sports Institute will take over the
  Remmi Live Club and the stage at Cultural House Wiljami for two performances
  on March 17 and 18 at 7 PM. The program features a concise selection of the
  students’ own works as well as pieces created under the guidance of their
  teachers. The performances are part of the students’ studies.


  Bar Wiljami will be serving throughout the evening. You may also enjoy non-alcoholic drinks in the auditorium. Doors, ticket sales, and Bar Wiljami open one hour before each club.
