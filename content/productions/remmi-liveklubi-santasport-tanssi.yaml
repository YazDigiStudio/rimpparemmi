short_text_fi: Nuoret tekijät tuovat omia teoksiaan kulttuuritalo Wiljamin
  lavalle. Näytöksissä nähdään soolo- ja ryhmäteoksia jotka ovat kaikki
  opiskelijoiden itsensä luomia.
short_text_en: Young artists will present their own works on stage at the
  Wiljami Cultural Center. The performances will feature solo and group pieces,
  all created by the students themselves.
long_text_fi: >-
  Herkkua luvassa! Nuoret tekijät tuovat omia teoksiaan kulttuuritalo Wiljamin
  lavalle. Näytöksissä nähdään soolo- ja ryhmäteoksia jotka ovat kaikki
  opiskelijoiden itsensä luomia. Teoksia on paljon, ja kahtena päivänä
  nähdäänkin kaksi eri näytöstä. Joten varaathan paikkasi molempiin niin et jää
  mistään paitsi!



  Näytösten kesto n. 2h
long_text_en: >-
  A treat in store! Young artists will be bringing their own works to the stage
  at the Wiljami Cultural Center. The performances will feature solo and group
  pieces, all created by the students themselves. There are many pieces, and two
  different performances will be held over two days. So be sure to reserve your
  spot for both so you don’t miss a thing!





  Performance duration: approx. 2 hours
