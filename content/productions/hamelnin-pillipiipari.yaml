short_text_fi: Uusi, hulvaton tulkinta laittaa klassikkosadun ranttaliksi!
  Tanssia, teatteria ja sirkusta yhdistävä esitys live-musiikin tahdittamana
  yllättää ja hauskuttaa.
short_text_en: A new, hilarious take turns the classic fairy tale upside down! A
  show combining dance, theatre, and circus with live music — it surprises and
  entertains.
long_text_fi: >
  Hamelnin kaupunkia vaivaa rottaongelma, varsinainen rottastrofi. Paikalle
  saapuu salaperäinen pilliä soittava muukalainen, joka lupaa karkottaa
  kiusanhenget kaupungista. Mutta jos tämä pillipiipari pystyy lumoamaan rotat
  soitollaan, mitä muuta hän voi saada aikaan?


  Syksyn 2024 koko perheen ensi-iltateos on kollaasi huvittavista tyypeistä ja vauhdikkaista tilanteista. Hamelnin Pillipiipari on klassikkosadun uusi tulkinta, jossa ei arkailla panna ranttaliksi. Tanssia, teatteria ja sirkusta yhdistävä esitys live-musiikin tahdittamana yllättää ja hauskuttaa. Tätä ette takuulla odottaneet!
long_text_en: >
  The city of Hamelin is plagued by rats — a true rat catastrophe. A mysterious
  piper arrives and promises to drive the pests away. But if this pied piper can
  bewitch the rats with his music, what else might he be capable of?


  This autumn 2024 family production is a collage of amusing characters and fast-paced situations. The Pied Piper of Hamelin is a bold new take on a classic fairy tale. A show combining dance, theatre, and circus with live music — it will surprise and delight. You definitely won't see this coming!
