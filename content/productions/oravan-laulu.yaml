short_text_fi: "Oravan laulu on svengaava tanssinteatteriesitys, jossa
  ihastuttavat 1970-luvun musiikkihitit. "
short_text_en: "The Squirrel's Song is a lively dance theater performance
  featuring delightful 1970s hits. "
long_text_fi: "Riehakkaan illan jälkeinen aamu muutaman vuosikymmenen takaa
  valkenee: Päätä jomottaa, kaupunki ahdistaa. Tulee valtava kaipuu luontoon –
  kuusen latvaan, oravan pesään. Tolppakorot kopisten matkalaukkua ryhdytään
  pakkamaan, mutta mahtuuko kapsäkkiin miestä?"
long_text_en: "The morning after a wild night, a few decades ago, dawns: My head
  is pounding, and the city feels suffocating. I feel an overwhelming longing
  for nature—for the top of a spruce tree, for a squirrel’s nest. With my heels
  clicking, I start packing my suitcase, but will there be room for a man in
  this little bag?"
