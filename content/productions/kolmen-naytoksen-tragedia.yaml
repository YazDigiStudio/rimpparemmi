long_text_fi: >-
  Absurdius ja tilanteen älyttömyys ovat keskiössä Kolmen näytöksen tragediassa.
  Liikekieli muodostuu tanssista ja fyysisestä teatterista. Kolmen näytöksen
  tragedian kehollistavat Rimpparemmin tanssijat Herd ja Järvensivu sekä
  muusikko Nurmela.


  Milla Virtanen on oululainen taiteilija, joka on valmistunut tanssijaksi Fontys tanssiakatemiasta Hollannista. Opiskelun jälkeen hän on työskennellyt freelancetanssijana ja -esiintyjänä Hollannissa ja Suomessa. Vuodesta 2007 lähtien Virtanen on luonut 15 tanssiteatteriteosta ja hänen taidettaan on ollut esillä 12 maassa. Hänen taiteellinen pääinstrumenttinsa on tanssi. Tanssin rinnalla hän käyttää monipuolisesti myös muita työkaluja kuten visuaalista taidetta ja fyysistä teatteria.


  Pakonomainen tarkastamisen tarve, ulkopuolisuuden tunne sekä ihmisten tavoitteellisuuden nälkä ovat mm. aiheita, joita Virtanen on käsitellyt teoksissaan. Hänen teoksilleen valitsemat teemat ovat sellaisia, joita hän tunnistaa itsessään. Virtanen on kiinnostunut irrationaalisuudesta, sen yhtäaikaisen viehätyksen ja hämmennyksen vuoksi. Hän kuvaa luomisprosessia yhtä aikaa ihanaksi ja samalla pelottavaksi hypyksi tuntemattomaan: *”Luomisprosessissa laskeutuminen voi olla joko sulava, tai se voi läsähtää mojovasti vasten kasvoja. Hyppy kannattaa aina tehdä, katkenneella korkokengälläkin.”.*
long_text_en: >-
  Absurdity and the absurdity of the situation are at the heart of this
  three-act tragedy. The movement language combines dance and physical theater.
  This three-act tragedy is brought to life by Rimpparemmi dancers Herd and
  Järvensivu, along with musician Nurmela.


  Milla Virtanen is an artist from Oulu who graduated as a dancer from the Fontys Dance Academy in the Netherlands. Since completing her studies, she has worked as a freelance dancer and performer in the Netherlands and Finland. Since 2007, Virtanen has created 15 dance theater works, and her art has been presented in 12 countries. Her primary artistic medium is dance. Alongside dance, she also makes versatile use of other tools such as visual art and physical theater.


  The compulsive need to scrutinize, the feeling of being an outsider, and people’s hunger for achievement are among the themes Virtanen has explored in her works. The themes she chooses for her works are ones she recognizes within herself. Virtanen is interested in irrationality, due to its simultaneous allure and confusion. He describes the creative process as both a wonderful and terrifying leap into the unknown: “In the creative process, the landing can be either smooth, or it can slam hard right in your face. It’s always worth taking the leap, even in a broken high heel.”
