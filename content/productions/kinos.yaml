short_text_fi: Tuulen kuljettamia tanssintekijöitä on kasaantunut yhteen. Lunta
  luomassa koreografit Matti Paloniemi, Kira Riikonen ja Satu Tuomisto.
short_text_en: A group of dancers, carried by the wind, has gathered together.
  Choreographers Matti Paloniemi, Kira Riikonen, and Satu Tuomisto are creating
  a snow scene.
long_text_fi: >-
  ## Sinua


  *Sinua on ensitapaaminen, puusauna, pitkä litania verbejä ja häävalssi. Ilman valssia.*



  **Koreografia** Satu Tuomisto (JoJo)

  **Tanssijat** Anni Pilhjärta ja Atte Herd (Rimpparemmi)

  **Musiikki** Lauri Tuohimaa (JoJo)

  **Valo** Mika Ryynänen (JoJo)

  **Puvustus** Kaija Maunula (Rimpparemmi)


  ## Omenavaras



  *Nainen, mies ja omena. Välissä olettamukset, odotukset ja menneisyyden muistot. Sekunnin sadasosa ja silmänräpäys.* 


  **Koreografia** Kira Riikonen (Routa)

  **Tanssijat** Milla Virtanen ja Tuomas Mikkola (JoJo)

  **Musiikki** Jori Tossavainen (Routa)

  **Valo** Mika Ryynänen (JoJo)

  **Puvustus** Heidi Kesti (JoJo)


  ## Aikalainen



  *Kaksi naista aikalaista, seremonia on epäselvä.*


  **Koreografia** Matti Paloniemi (Rimpparemmi)

  **Tanssijat** Anna Riski-Round ja Sini Siipola (Routa)

  **Äänisuunnittelu** Henri Haakana (Rimpparemmi)

  **Pukusuunnittelu** Kaija Maunula (Rimpparemmi)
long_text_en: >-
  ## You


  You is a first meeting, a wood-fired sauna, a long litany of verbs, and a wedding waltz. Without the waltz.




  Choreography by Satu Tuomisto (JoJo)


  Dancers Anni Pilhjärta and Atte Herd (Rimpparemmi)


  Music by Lauri Tuohimaa (JoJo)


  Lighting by Mika Ryynänen (JoJo)


  Costumes by Kaija Maunula (Rimpparemmi)




  ## The Apple Thief




  A woman, a man, and an apple. In between: assumptions, expectations, and memories of the past. A hundredth of a second and the blink of an eye. 




  Choreography by Kira Riikonen (Routa)


  Dancers Milla Virtanen and Tuomas Mikkola (JoJo)


  Music by Jori Tossavainen (Routa)


  Lighting by Mika Ryynänen (JoJo)


  Costumes by Heidi Kesti (JoJo)




  ## Contemporary




  Two women of the same generation; the nature of the ceremony is unclear.




  Choreography by Matti Paloniemi (Rimpparemmi)


  Dancers: Anna Riski-Round and Sini Siipola (Routa)


  Sound design by Henri Haakana (Rimpparemmi)


  Costume design by Kaija Maunula (Rimpparemmi)
