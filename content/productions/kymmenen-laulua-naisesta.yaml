short_text_fi: Turkulainen Aurinkobaletti ja rovaniemeläinen Tanssiteatteri
  Rimpparemmi tuottavat Suomen 100-vuotisjuhlan kunniaksi tanssia ja musiikkia
  yhdistävän teoksen Kymmenen laulua naisesta.
short_text_en: Aurinkobaletti from Turku and Tanssiteatteri Rimpparemmi from
  Rovaniemi are presenting Ten Songs About a Woman, a production combining dance
  and music, in honor of Finland’s 100th anniversary.
long_text_fi: >-
  Turkulainen Aurinkobaletti ja rovaniemeläinen Tanssiteatteri Rimpparemmi
  tuottavat Suomen 100-vuotisjuhlan kunniaksi tanssia ja musiikkia yhdistävän
  teoksen Kymmenen laulua naisesta. 30. elokuuta Rovaniemellä Lappia-talolla
  ensi-iltansa saavan teoksen käsikirjoituksesta ja koreografiasta vastaa
  taiteen akateemikko Marjo Kuusela ja lauluista säveltäjälegenda Kaj Chydenius.
  Turun ensi-ilta on 9. marraskuuta Åbo Svenska Teaterissa.


  Kymmenen laulua naisesta -teoksen johtavia teemoja ovat naiseus ja suomalaisen naisen identiteetti, henkisten ja fyysisten rajojen ylittäminen sekä suomalaisuuden moninaisuus. Teos kysyy: mikä ajaa ihmistä rajojen ylittämiseen, ovatko yhteisö ja perhe yhteiskunnallista uhmaa rajoittavia vai vahvistavia tekijöitä?


  Avainhahmoksi teoksessa nousee italialais-ruotsalaista syntyperää oleva sirkustaiteilija Elvira Bono, jonka vaiherikkaaseen elämään kuului muun muassa avioliitto taiteilija Jalmari Ruokokosken kanssa, osallistuminen vuoden 1918 Petsamon heimosotaretkeen sekä työmaan emäntänä toimiminen Lapin kultamailla. Bonon lisäksi episodimaista teosta kuljettavat eteenpäin useat muutkin Suomessa vaikuttaneet vahvat naiset Hella Wuolijoesta ja L. Onervasta tuntemattomiksi jääneisiin kansannaisiin.
long_text_en: >-
  Turku-based Aurinkobaletti and Rovaniemi-based Tanssiteatteri Rimpparemmi are
  producing Ten Songs About a Woman, a work combining dance and music, in honor
  of Finland’s 100th anniversary. The production, which premieres on August 30
  at Lappia Hall in Rovaniemi, features a script and choreography by Marjo
  Kuusela, a member of the Finnish Academy of Arts, and music by legendary
  composer Kaj Chydenius. The Turku premiere is on November 9 at Åbo Svenska
  Teater.


  The central themes of Ten Songs About a Woman are womanhood and the identity of Finnish women, the crossing of mental and physical boundaries, and the diversity of Finnishness. The work asks: what drives people to cross boundaries, and are community and family factors that limit or reinforce social defiance?


  A key figure in the work is Elvira Bono, a circus artist of Italian-Swedish descent, whose eventful life included, among other things, a marriage to the artist Jalmari Ruokokoski, participation in the 1918 Petsamo expedition, and working as a camp hostess in the goldfields of Lapland. In addition to Bono, the episodic work is driven forward by several other strong women who made their mark in Finland, ranging from Hella Wuolijoki and L. Onerva to lesser-known folk women.
