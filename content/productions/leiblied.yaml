long_text_fi: >-
  Vuosina 1941-1944 Saksan armeijan joukot olivat asettautuneet Lappiin. He
  toimivat ystävällismielisessä maassa kohteliaasti ja vaalivat yhteiseloa
  paikallisten kanssa. Asiat olivat Lapissa hyvin: Saksalaisten myötä sekä
  kaupankäynti että kulttuurinen ja sosiaalinen elämä vilkastuivat ankeiden
  sotavuosien jälkeen.


  Leiblied avaa aikaikkunan tuohon vuosikymmenten takaiseen Lappiin. Iskelmämusiikin soidessa nuoret naiset ja saksalaiset sotilaat vaihtavat katseita, jotka paljastavat kiihkeän odotuksen elämästä ja rakkaudesta. Yhdessä viihtyvät ihmiset eivät kaipaa yhteistä kieltä ilonpitoon. Heidän välillensä muodostuu aitoa ystävyyttä ja syttyy tosi rakkautta. Elämä on riemukkaan kiehtovaa ja vakaata, vaikka toisaalla käydään taisteluja.


  Me tiedämme, miten tuo kaikki päättyi. Kun käskynanto tapahtui, iloinen yhteiselo sai dramaattisen lopetuksen – ystävyys ja rakkaus päätettiin muiden toimesta.


  Leibliedin runollinen nimi merkitsee vapaasti suomennettuna kehon laulua. Teoksen vuosiksi vaiettuun aiheeseen tarttui virolaislähtöinen koreografi Urmas Poolamets, joka toimii taiteellisena johtajana turkulaisessa Aurinkobaletissa.
long_text_en: >-
  From 1941 to 1944, German troops were stationed in Lapland. They behaved
  courteously in this hospitable region and fostered harmonious relations with
  the locals. Things were going well in Lapland: with the Germans there, both
  commerce and cultural and social life picked up after the bleak war years.




  Leiblied opens a window into that Lapland of decades past. As pop music plays, young women and German soldiers exchange glances that reveal a passionate anticipation of life and love. People who enjoy each other’s company don’t need a common language to have fun. Genuine friendship forms between them, and true love blossoms. Life is joyfully captivating and stable, even as battles rage elsewhere.




  We know how it all ended. When the order was given, the joyful coexistence came to a dramatic end—friendship and love were ended by others.




  The poetic title of Leiblied loosely translates to “song of the body.” Estonian-born choreographer Urmas Poolamets, who serves as artistic director of the Turku-based Aurinkobaletti, took on the work’s long-silenced subject matter.
