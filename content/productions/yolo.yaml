short_text_en: YOLO explores the dreams we dream of and the life that unfolds.
  The performance highlights significant events of youth, such as first love,
  sexual awakening, and the anarchic rabbits running wild in the subconscious.
long_text_fi: >-
  YOLO käsittelee unelmia, joista haaveillaan ja elämää, joka toteutuu.
  Esityksessä nousevat esiin nuoruuden merkittävät tapahtumat, kuten ensimmäinen
  rakastuminen, seksuaalinen herääminen ja alitajunnassa laukkaavat anarkistiset
  jänikset. YOLO on kohtaamisia toinen toisensa perään ihmeellisessä luonnossa,
  jossa jokainen meistä on osallistunut oman elämänsä tärkeimpään
  uintikilpailuun jo kauan ennen kuin näimme ensimmäisen aamunkoiton. 


  Esityksen valmistusprosessin aikana on järjestetty unelmatyöpajoja nuorille yhteistyössä koulujen kanssa. Koreografi Sampo Kerola on aktivoinut nuoria pohtimaan omia haaveita, unelmia ja pelkoja erilaisin ilmaisutaidon keinoin. Työpajoissa esiin nousseita asioita nähdään YOLO-esityksessä.
long_text_en: >-
  YOLO explores the dreams we dream and the life that unfolds. The performance
  highlights significant events of youth, such as first love, sexual awakening,
  and the anarchic rabbits running wild in our subconscious. YOLO is a series of
  encounters one after another in a wondrous natural setting, where each of us
  has participated in the most important swimming race of our own lives long
  before we saw our first sunrise. 




  During the production process, dream workshops for young people were organized in collaboration with schools. Choreographer Sampo Kerola has encouraged young people to reflect on their own hopes, dreams, and fears through various means of expression. The themes that emerged from the workshops are reflected in the YOLO performance.
