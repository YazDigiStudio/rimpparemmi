short_text_fi: YOLO käsittelee unelmia, joista haaveillaan ja elämää, joka
  toteutuu. Esityksessä nousevat esiin nuoruuden merkittävät tapahtumat, kuten
  ensimmäinen rakastuminen, seksuaalinen herääminen ja alitajunnassa laukkaavat
