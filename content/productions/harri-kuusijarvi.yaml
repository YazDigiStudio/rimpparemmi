long_text_fi: >-
  ## Remmi Liveklubi –


  ## Harri Kuusijärvi Trio: Aallot


  Uusimmassa projektissaan Aallot harmonikkataiteilija [Harri Kuusijärvi](https://www.harrikuusijarvi.com/) yhdistää uuden elektronisesti laajennetun harmonikkansa basisti Jori Huhtalan ja rumpali Mika Kallion muodostaman jazz-rytmisektion akustiseen lämpöön. Trio yhdistää pohjoismaisen seesteisyyden kuplivaan jazz-energiaan. Tuloksena on musiikkia, joka on maanläheistä, minimalistista ja vastustamattoman groovaavaa – ja luultavasti jotain sellaista, mitä tuskin olet ennen kuullut.


  Harri Kuusijärvi on uuden harmonikkamusiikin omaleimaisimpia tekijöitä. Hän on kantaesittänyt lukuisia harmonikalle sävellettyjä nykymusiikkiteoksia, esiintynyt rytmimusiikin saralla lukemattomien etu- ja takarivin artistien kanssa ja kerännyt albumeillaan kiittäviä arvioita yli genrerajojen. Suomen Harmonikkaliitto valitsi Kuusijärven Vuoden harmonikkataiteilijaksi 2023 todeten perusteluissa, että ”Kuusijärvi on ennakkoluulottomilla projekteillaan laajentanut käsitystä siitä, mihin kaikkeen harmonikka voi soittimena taipua”. Kuusijärvi on noteerattu myös Vuoden klassinen -ehdokkuudella Emma Gaalassa vuonna 2021, ja Teosto-palkintoehdokkuudella vuonna 2020.


  ​


  Yhtyeen ensimmäinen studiosessio radioitiin YLE Jazzklubi -ohjelmassa kesäkuussa 2024. Debyyttialbumi Aallot julkaistaan tammikuussa 2025 Flame Jazz Records -yhtiön kautta.
long_text_en: >-
  ## Remmi Live Club –


  ## Harri Kuusijärvi Trio: Aallot


  In his latest project, Aallot, accordionist [Harri Kuusijärvi](https://www.harrikuusijarvi.com/) combines the acoustic warmth of a jazz rhythm section—featuring bassist Jori Huhtala and drummer Mika Kallio—with his new electronically enhanced accordion. The trio blends Nordic serenity with effervescent jazz energy. The result is music that is earthy, minimalist, and irresistibly groovy—and probably something you’ve hardly ever heard before.


  Harri Kuusijärvi is one of the most distinctive figures in contemporary accordion music. He has premiered numerous contemporary works composed for the accordion, performed in the realm of rhythm music with countless artists from both the front and back lines, and garnered rave reviews across genre boundaries for his albums. The Finnish Accordion Association named Kuusijärvi Accordion Artist of the Year 2023, stating in its rationale that “with his open-minded projects, Kuusijärvi has expanded the understanding of just how versatile the accordion can be as an instrument.” Kuusijärvi was also nominated for Classical Artist of the Year at the Emma Gala in 2021 and for the Teosto Award in 2020.


  ​


  The ensemble’s first studio session was broadcast on the YLE Jazzklubi program in June 2024. Their debut album, Aallot, will be released in January 2025 via Flame Jazz Records.
