long_text_fi: >-
  Pikkujoulut. Tuo kaikkien yhteisöjen odotetuin juhla on taas tuloillaan.


  Mitä tehdä ja mihin mennä, jotta kaikkien kulkuset helisisivät yhtä iloisesti?


  Valinta on vaikeaa, kun yksi haluaa teatteriin ja toinen konserttiin, kolmas haluaa vain baariin ja neljäs ravintolaan. Eräs toivoo nostalgista tunnelmointia, mutta samalla komiikkaa ja viihdettä. Entäs hän, joka toivoo yhteisiä pelejä ja leikkejä, kun taas kaverit haluavat karaokeen?


  Tanssiteatteri Rimpparemmi vastaa kysyntään ja on luonut – jos nyt ei maailman parhaat niin ainakin tulevan joulukauden parhaat pikkujoulut – meille kaikille!


  #### Hävyttömän hyvä Joulushow tuo Kulttuuritalo Wiljamin lavalle pikkujouluihin sopivan kattauksen musiikkia, tanssia ja hauskimmat ohjelmanumerot, joissa yhdistyvät kouluaikaiset joulujuhlat ja perinteeksi muodostunut Kinkkubingo. Pikkujoulut, jotka eivät petä uudenlaista joulutunnelmaa etsivää tai perinteikästä joulumieltä haluavaa juhlijaa.


  Joulushown keskiössä on Joulushowbändi, johon kuuluvat Rimpparemmin muusikot vahvistettuna vierailevilla muusikoilla, solistinaan letkeälanteinen ja karismaattinen näyttelijä Joni Kuokkanen. Joulushowbändi tarjoilee yleisölle Michael Bublén suurimmat jouluhitit, Jacques Brelin suomeksi käännetyt ajattomat ja kiihkeät laulut sekä tietysti perinteisiä joululauluja. Koko esitystä luotsaavat Rimpparemmin viihdesiskokset Helmi Järvensivu ja Laura Kallas viihdyttäjä Atte Herdin kanssa.
long_text_en: >-
  Pre-Christmas parties. That celebration everyone looks forward to is just
  around the corner again.


  What should we do and where should we go to make sure everyone’s bells ring just as merrily?


  It’s a tough choice when one person wants to go to the theater, another to a concert, a third just wants to hit the bars, and a fourth wants to go to a restaurant. One person hopes for a nostalgic atmosphere, but also wants comedy and entertainment. What about the one who wants group games and activities, while their friends want karaoke?


  Dance Theater Rimpparemmi meets the demand and has created—if not the world’s best, then at least the best pre-Christmas party of the upcoming holiday season—for all of us!


  #### The outrageously good Christmas Show brings a lineup of music, dance, and the funniest acts to the stage at Kulttuuritalo Wiljami, combining school-style Christmas parties with the now-traditional Kinkkubingo. A pre-Christmas party that won’t disappoint anyone looking for a new kind of Christmas spirit or a traditional Christmas atmosphere.


  At the heart of the Christmas show is the Christmas Show Band, featuring the musicians of Rimpparemmi, reinforced by guest musicians, with the easygoing and charismatic actor Joni Kuokkanen as the soloist. The Christmas Show Band treats the audience to Michael Bublé’s greatest Christmas hits, Jacques Brel’s timeless and passionate songs translated into Finnish, and, of course, traditional Christmas carols. The entire show is hosted by Rimpparemmi’s entertainment sisters Helmi Järvensivu and Laura Kallas, along with entertainer Atte Herd.
