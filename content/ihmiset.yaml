      - name: Matti Paloniemi
        title_fi: Taiteellinen johtaja
        title_en: Artistic director
        image: https://firebasestorage.googleapis.com/v0/b/rimpparemmi-b3154.firebasestorage.app/o/cms%2Fweb%2F1773394474942-Matti-Paloniemi-scaled.webp?alt=media
        bio_fi: >-
          Tanssiteatteri Rimpparemmin johtaja on taiteellinen johtaja,
          koreografi Matti Paloniemi. Paloniemellä on 25 vuoden ammatillinen
          kokemus tanssitaiteen alalta tanssijana, koreografina, tuottajana ja
          ohjaajana sekä työryhmien johtajana. Paloniemi on tehnyt kymmeniä koko
          illan teoksia ympäri Suomen tanssiteattereille ja puheteattereille.
          Paloniemi on toiminut Rimpparemmin taiteellisena johtaja vuodesta 2010
          lähtien.


          Matti Paloniemi oli Tanssiteatteri Tsuumin taiteellinen johtaja vuosina 1998-2007. Paloniemi on uransa aikana ollut useissa luottamustoimissa mm.: Tanssin tiedotuskeskuksen hallitus 2010-2015 ja Suomen Teatterit ry hallitus 2014-2020. Paloniemi on opiskellut tanssia Oulun konservatoriossa ja koreografiaa Teatterikorkeakoulussa. Paloniemi on valmistunut Esittävien taiteiden johtajan ammattitutkinnon koulutuksesta vuonna 2021.


          Paloniemi pitää tanssissa liikkeestä ja sen äärettömistä mahdollisuuksista tulkita elämää. Hän ei pidä tanssissa sen rahoituksesta.
