description: |-
  Uros Live on ajatuksia herättävä katsaus uroiden olemukseen

  ja siihen, kuinka yhteiskunnalliset normit muokkaavat

  käsitystä miehisyydestä.Se on kuvia ja tunnelmia miehenä

  olemisesta ja olemattomuudesta. Kyllä, mies on yksi juridisista

  sukupuolista.

  Uros Live on sukellus maskuliinisuuden monimuotoisuuteen.

  Tämä teos piirtää tuokiokuvia ja tunnelmia miehenä

  olemisesta ja olemattomuudesta, tutkien miehen roolia

  yhteiskunnassa ja ihmissuhteissa.

  Mies ei synny tyhjästä – maskuliinisuus rakentuu odotusten,

  kokemusten ja suhteiden kautta. Teos avaa ovia herkkyyteen,

  riemun räminään ja kipeisiin kysymyksiin. Se haastaa

  ajatukset siitä, mitä miehisyys on ja millaiseksi sen odotetaan

  muotoutuvan.



  Kohdeyleisö: yli 13- vuotiaat, yläkoulut + lukiot

  Kesto: 45 min. / 3 esiintyjää + ääniteknikko

  Saatavana myös teatteritilan 60 min. versio aikuisille. Kysy

  lisää.
