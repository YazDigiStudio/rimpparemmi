production_id: hyppynarutus
sort_order: 10
description: >-
  Vuorovaikutteisin teoksen hahmot, Hyppy ja Naru ovat poppomisen
  erikoisasiantuntijoita. Heillä ei käy aika pitkäksi, kun leluina ovat
  hyppynarut. Niiden avulla he vievät katsojat maailman korkeimmalle vuorelle
  Mount Everestille, laittavat pystyyn hullunkuriset urheilukisat ja toteuttavat
  jopa ikioman sirkusesityksen. 


  Tervetuloa mukaan tälle rytmikkäälle tanssimatkalle, mutta pidä varasi - saatat joutua huomaamattasi narutetuksi! 


  Koreografi Jaakko Toivonen hakee tanssiteoksiinsa usein inspiraatiota omasta lapsuudestaan. Lapsuudesta, jossa itssekeksityt seikkailut olivat kaikkein mieluisimpia leikkejä. Hiekkalaatikko saattoi muuttua hotelliksi, vaatekaappi portaaliksi toiseen ulottuvuuteen ja pyörätelineet hevostalliksi. Leikin avulla voi koetella mielikuvituksen rajoja. Ja Hyppynarutus - tanssiteos tekee juuri sen!


  Esiintyjät Helmi Järvensivu ja Laura Kallas


  Koreografia, äänisuunnittelu ja skenografia: Jaakko Toivonen


  Taiteellinen neuvonantaja: Sanna Silvennoinen


  Puvustus: Elina Tuomisto


  Alkuperäisteos: Tanssiteatteri Raatikko
