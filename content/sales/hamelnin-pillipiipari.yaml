production_id: hamelnin-pillipiipari
sort_order: 10
description: |-
  Hamelnin kaupunkia vaivaa rottaongelma, varsinainen

  rottastrofi. Paikalle saapuu salaperäinen pilliä soittava

  muukalainen, joka lupaa karkottaa kiusanhenget

  kaupungista. Mutta jos tämä pillipiipari pystyy lumoamaan

  rotat soitollaan, mitä muuta hän voi saada aikaan?

  Tämä koko perheen teos on kollaasi huvittavista tyypeistä

  ja vauhdikkaista tilanteista. Hamelnin Pillipiipari on

  klassikkosadun uusi tulkinta, jossa ei arkailla panna

  ranttaliksi. Tanssia, teatteria ja sirkusta yhdistävä esitys

  live-musiikin tahdittamana yllättää ja hauskuttaa. Tätä

  ette takuulla odottaneet!

  Ohjaus ja koreografia: Sanna Silvennoinen ja Jaakko

  Toivonen

  Äänisuunnittelu ja sävellys: Iiro Ollila

  Lavastus ja pukusuunnittelu: Mirkka Nyrhinen

  Valosuunnittelu: Vilma Vantola

  Tekstit: Hannes Mikkelsson

  Esiintyjät: Laura Kallas, Joni Kuokkanen, Liina Leppänen,

  Lauri Uusitalo
