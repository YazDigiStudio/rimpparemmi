description: |-
  ### Jacques Brel - Valssiin syntiseen

  Musiikkiesitys, jonka laulujen aiheet ja sanat vievät yleisön

  tunteikkaalle ja elämän makuiselle matkalle Jacques Brelin

  rakastettujen, suomeksi käännettyjen, chansonien maailmaan.

  Esitys koostuu Jacques Brelin tuotannon helmistä, jotka ovat

  tunnettuja niin Suomessa kuin ympäri Eurooppaa.

  Vuonna 1929 Belgiassa syntynyttä, Ranskassa ikänsä asunutta

  laulaja-lauluntekijää Jacques Breliä pidetään yhtenä kaikkien

  aikojen parhaana ranskankielisenä säveltäjänä. Breliä on

  kutsuttu tekstiensä vuoksi myös runoilijaksi. Jacques Brelin

  laulut eli chansonit kertovat elämästä: rakkaudesta,

  kuolemasta sekä yhteiskunnallisista havainnoista. Synkkiäkin

  aiheita, kuten kuolemaa, käsitellään hulvattomasti Brelin

  tapaan.

  Tässä esityksessä Tanssiteatteri Rimpparemmin

  ammattimuusikot päästävät kaiken irti. Välillä juostaan kuin

  härät kohti kuolemaa ja välillä pidätetään hengitystä, jotta ei

  sanottaisi liikaa. Amsterdam, Vanhojen rakastavaisten laulu,

  Jos nyt menet pois vievätkin kuulijan Amsterdamin kaduille ja

  sieltä aina hellään ja katkeraan rakkauteen.

  Kapellimestarina toimii Jukka Nurmela, joka haluaa tuoda

  esityksen lähelle Brelin uran alkuaikojen intiimien ja hämyisten

  klubikeikkojen tunnelmaa. Nurmelan kontrabasson lisäksi

  kokoonpanossa kuullaan Anne-Mari Kanniaisen harmonikkaa

  ja Lauri Uusitalo pianoa. Brelin tekstejä tulkitsee laulullaan

  karismaattinen näyttelijä Joni Kuokkanen Rovaniemeltä.
