description: >-
  Musiikkiesitys, jonka laulujen aiheet ja sanat vievät yleisön tunteikkaalle ja
  elämän makuiselle matkalle Jacques Brellin rakastettujen, suomeksi
  käännettyjen, chansonien maailmaan. Esitys koostuu Jacques Brellin tuotannon
  helmistä, jotka ovat tunnettuja niin Suomessa kuin ympäri Eurooppaa. 


  Vuonna 1929 Belgiassa syntynyttä, Ranskassa ikänsä asunutta laulaja-lauluntekijää Jacques Brelliä pidetään yhtenä kaikkien aikojen parhaana ranskankielisenä säveltäjänä. Brelliä on kutsuttu tekstiensä vuoksi myös runoilijaksi. Jacques Brellin laulut eli chansonit kortovat elämästä: rakkaudesta, kuolemasta sekä yhteiskunnallisista havainnoista. Synkkiäkin aiheita, kuten kuolemaa, käsitellään hulvattomasti Brelin tapaan.


  Tässä esityksessä Tanssiteatteri Rimpparemmin ammattimuusikot päästävät kaiken irti. Välillä juostaan kuin härät kohti kuolemaa ja välillä pidätetään hengitystä, jotta ei sanottaisi liikaa. Amsterdam, Vanhojen rakastavaisten laulu, Jos nyt menet pois vievätkin kuulijan Amsterdamin kaduille ja sieltä aina hellään ja katkeraan rakkauteen. 


  Kapellimestarina toimii Jukka Nurmela, joka haluaa tuoda esityksen lähelle Brellin uran alkuaikojen intiimien ja hämyisten klubikeikkojen tunnelmaa. Nurmelan kontrabasson lisäksi kokoonpanossa kuullaan Anne-Mari Kanniaisen harmonikkaa ja Lauri Uusitalon pianoa. Brellin tekstejä tulkitsee laulullaan karismaattinen näyttelijä Joni Kuokkanen Rovaniemeltä.
