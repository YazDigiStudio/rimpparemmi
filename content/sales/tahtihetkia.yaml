sort_order: 10
description: >-
  Tässä aikuisille ja senioreille suunnatussa musiikki- esityksessä sukelletaan
  suomalaisen elokuvamusiikin maailmaan - siihen tunnelmaan, joka syntyy, kun
  sävelet jäävät soimaan korvamatona ja kohtaukset piirtyvät muistiin
  vuosikymmenten takaa. 


  Lavalla heräävät eoon tuttuuden tunne ja nostalgian lämpö, kun kuullaan elokuvamusiikin helmiä eri vuosikymmeniltä. Ohjelmistossa kuullaan monipuolinen kattaus tunnelmia: mm. Akselin ja Elinan häävalssi, Seitsemän kertaa seitsemän, Tuomittuna kulkemaan. 


  Jokainen kappale kantaa mukanaan palan suomalaisesta elokuvahistoriasta - herkiä, joita ei unohdeta. Musiikin lomassa tehdään pieniä aikamatkoja itse elokuvien maailmaan - muistelemme tarinoita ja tunnelmia, joista nämä kappaleet ovat aikanaan syntyneet. Luvassa on siis musiikillinen elokuvahetki, jossa saa nauttia, muistaa ja ehkä vähän hyräilläkin mukana.
price_info: 350€ + matkakulut
