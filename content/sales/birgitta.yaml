production_id: birgitta
sort_order: 10
description: >-
  > Tee tästä syyskauden puhutuin ilta – illallinen ja esitys samassa paketissa.

  >

  > Tanssiteatteri Rimpparemmin syksyn uutuusteos Birgitta - linnutkin itkevät taivaalla tuo pikkujoulukauteen juhlan, johon sinutkin on kutsuttu!

  >

  >

  >

  > *On häät.*

  >

  > *Kirkko on täynnä ihmisiä, kukkia ja odotuksia. Kaikki on valmiina, paitsi morsian.*

  >

  > *Matti Paloniemen ohjaaman esityksen tunnelma liikkuu hulvattoman ja haikean välillä, kun hääseurue yrittää pitää kasassa juhlaa, kulisseja ja itseään.*

  >

  > *Birgitta – linnutkin itkevät taivaalla on fyysinen, absurdi ja tunnistettava teos, jossa tango palaa ja juhla repeää käsistä!*

  >

  >

  >

  >

  > Kulttuuritalo Wiljamissa ilta alkaa buffet-pöydästä. Rauhassa. Hyvässä seurassa.

  >

  > Ja jatkuu salissa, jossa häät eivät mene suunnitelmien mukaan.
