    body: >-
      **Tanssiteatteri Rimpparemmi** on Suomen pohjoisin ammattitanssiteatteri.
      Teemme fyysistä, musiikillista ja vahvasti näyttämöllistä nykytanssia ja
      tanssiteatteria.


      Esityksemme yhdistävät tarkkaa taiteellista työskentelyä, pohjoista identiteettiä ja sopivasti vinoa huumoria. Tarinamme voivat olla herkkiä tai ronskeja, mutta useimmiten todella hauskoja.


      Kotimme on Rovaniemellä Kulttuuritalo Wiljamissa, ja kierrämme aktiivisesti ympäri Suomea.


