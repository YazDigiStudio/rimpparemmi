intro_title_fi: Maailman parasta Lappilaista tanssiteatteria
intro_title_en: The Best Dance Theatre from Lapland
intro_text_fi: >-
  **Tanssiteatteri Rimpparemmi** on Suomen pohjoisin ammattitanssiteatteri.
  Teemme fyysistä, musiikillista ja vahvasti näyttämöllistä nykytanssia ja
  tanssiteatteria.


  Esityksemme yhdistävät tarkkaa taiteellista työskentelyä, pohjoista identiteettiä ja sopivasti vinoa huumoria. Tarinamme voivat olla herkkiä tai ronskeja, mutta useimmiten todella hauskoja.


  Kotimme on Rovaniemellä Kulttuuritalo Wiljamissa, ja kierrämme aktiivisesti ympäri Suomea.


  Tule kokemaan pohjoisen tanssin näyttämö.
intro_text_en: >-
  **Dance Theatre Rimpparemmi** is the northernmost professional dance theatre
  in Finland. We create physical, musical, and strongly theatrical contemporary
  dance and dance theatre.


  Our performances combine precise artistic work, northern identity, and a touch of quirky humor. Our stories can be tender or rough around the edges, but most often they are truly funny.


  Our home is in Rovaniemi at Cultural House Wiljami, and we actively tour across Finland.


  Come experience the dancestage of the North.
