intro_text_fi: |
  Tanssiteatteri Rimpparemmi kertoo tarinoita: kauniita ja rumia. Tarinoita, jotka ovat joskus röyhkeitä ja toisinaan vakavia, useimmiten kuitenkin todella hauskoja. Välittyköön Rimpparemmin tekemisestä riemu ja rakkaus taiteeseen sekä esiintymiseen. Rimpparemmi toivoo, että juuri sinä, voit vahvistaa pohjoista identiteettiä osallistumalla tanssitaiteen kokemiseen ja jakaa pohjoisen tunteen palon kanssamme, sen joka meitä kaikkia lopulta yhdistää.

  Tanssiteatteri Rimpparemmi on Suomen pohjoisin ammattitanssiteatteri. Rimpparemmin juuret ulottuvat 1970-luvulle, jolloin toiminta alkoi Tervolassa kansantanssiyhtyeenä. Kansantanssin karhea ilmaisuvoima yhdistyy tänä päivänä nykytanssin virtaavuuteen Rimpparemmin esityksissä. Musiikki on vahvasti läsnä kaikessa toiminnassa.

  Tanssiteatteri Rimpparemmi tuottaa Rovaniemellä tanssi- ja teatteriesityksiä Tanssin näyttämöllä Kulttuuritalo Wiljamissa. Tanssin näyttämön ohjelmisto koostuu Rimpparemmin omista tuotannoista, yhteistuotannoista sekä vierailevista esityksistä. Rimpparemmi kiertää aktiivisesti ympäri Suomea esittämässä maailman parasta lappilaista tanssiteatteria.

intro_text_en: |
  Dance Theatre Rimpparemmi tells stories: both beautiful and ugly. Stories that are sometimes bold and occasionally serious, but most often truly funny. Let the joy and love for art and performance be conveyed through Rimpparemmi's creations. Rimpparemmi hopes that you, specifically, can strengthen the northern identity by participating in the experience of dance art and by sharing the passion for the northern sentiment with us – that which ultimately unites all of us.

  Rimpparemmi Dance Theatre is the northernmost professional dance theatre in Finland. The roots of Rimpparemmi stretch back to the 1970s when its operations began in Tervola as a folk dance ensemble. The raw expressive power of folk dance blends with the fluidity of contemporary dance in Rimpparemmi's performances. Music is strongly present in all activities.

  Dance Theatre Rimpparemmi produces dance and theatre performances in Rovaniemi at their home stage in Kulttuuritalo Wiljami. The program consists of Rimpparemmi's own productions, collaborations, and guest performances. Rimpparemmi actively tours around Finland, presenting the world's best Lappish dance theatre.

