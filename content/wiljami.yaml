  - image_orientation: landscape
    image_position: left
    text_fi: >-
      Kulttuuritalo Wiljami, tunnettu myös nimellä Kansantalo, on Rovaniemellä
      sijaitseva kulttuurikeskus, joka tarjoaa monipuolista ohjelmaa eri
      taiteenaloilta. Rakennus valmistui vuonna 1947 ja toimii kotinäyttämönä
      useille rovaniemeläisille kulttuuritoimijoille — muun muassa
      Tanssiteatteri Rimpparemmi, Lapin Ylioppilasteatteri ja Elokuvakerho
      Cinema esittävät täällä ohjelmistoaan.


      Katsomossa on 120 istumapaikkaa, joista 2 on tarkoitettu pyörätuolinkäyttäjille.
  - image_alt_en: ""
    title_fi: Saapuminen Wiljamiin
    image_orientation: landscape
    image_position: left
    title_en: Arriving to Wiljami
    text_fi: >-
      Esityksemme nähdään Kulttuuritalo Wiljamissa, Rovaniemen keskustan
      tuntumassa.

      Osoite: Urheilukatu 1, 96100 Rovaniemi.

      Wiljamiin on helppo tulla olitpa liikkeellä kävellen, pyörällä, bussilla tai autolla.




      ###### Pysäköinti


      Parkkipaikat sijaitsevat Urheilukadulla ja Kulttuuritalo Wiljamin edessä. Pysäköinti on päivisin maksullista.

      Iltaesityksiin saapuessa löydät yleensä paikan vaivatta – mutta suosittelemme tulemaan ajoissa, niin ilta alkaa ilman parkkistressiä.

      Rovaniemen paikallisliikenteen bussit kulkevat keskustan kautta, ja Wiljamiin on lyhyt kävelymatka useilta pysäkeiltä. Aikataulut ja reitit löydät Rovaniemen paikallisliikenteen sivuilta.
    text_en: >-
      Our performance will take place at Kulttuuritalo Wiljami, near downtown
      Rovaniemi. Address: Urheilukatu 1, 96100 Rovaniemi. Wiljami is easy to
      reach whether you’re walking, biking, taking the bus, or driving.


      ###### Parking


      Parking spaces are located on Urheilukatu and in front of Kulttuuritalo Wiljami. Parking is paid during the day. When arriving for evening performances, you’ll usually find a spot easily—but we recommend arriving early so your evening can start without parking stress. Rovaniemi’s local buses run through the city center, and Wiljami is a short walk from several stops. You can find schedules and routes on the Rovaniemi local transport website.
