  - image_alt_en: Theatre Wiljami
    title_fi: Pystybaari Wiljami
    image_orientation: landscape
    image_position: right
    title_en: Pystybaari Wiljami
    text_fi: >
      Baari aukeaa Rimpparemmin esitysiltoina klo 18.00. Tarjolla on
      kuohuviinejä, oluita ja virvoitusjuomia. Maksuvälineenä käy kortti tai
      käteinen.


      *Meillä lasi on aina puoliksi täynnä.*


      **Lipunmyynti**

      Narikka ja lipunmyynti avautuvat tuntia ennen esitystä.
    text_en: >
      The bar opens at 6:00 PM on Rimpparemmi performance evenings. Sparkling
      wines, beers, and soft drinks are served. Both card and cash are accepted.


      *Our glass is always half full.*


      **Box office**

      The cloakroom and box office open one hour before performances.
