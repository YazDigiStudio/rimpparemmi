    title_en: ""
    text_fi: >
      Kulttuuritalo Wiljami, tunnettu myös nimellä Kansantalo, on Rovaniemellä
      sijaitseva kulttuurikeskus, joka tarjoaa monipuolista ohjelmaa eri
      taiteenaloilta. Rakennus valmistui vuonna 1947 ja toimii kotinäyttämönä
      useille rovaniemeläisille kulttuuritoimijoille — muun muassa
      Tanssiteatteri Rimpparemmi, Lapin Ylioppilasteatteri ja Elokuvakerho
      Cinema esittävät täällä ohjelmistoaan.


      Katsomossa on 120 istumapaikkaa, joista 2 on tarkoitettu pyörätuolinkäyttäjille.
    text_en: >
      Kulttuuritalo Wiljami, also known as Kansantalo, is a cultural centre in
      Rovaniemi offering diverse programming across the arts. The building was
      completed in 1947 and serves as the home venue for several Rovaniemi
      cultural organisations — including Dance Theatre Rimpparemmi, Lapin
      Ylioppilasteatteri and Elokuvakerho Cinema.


      The auditorium seats 120, including 2 wheelchair-accessible spaces.
    image: ""
