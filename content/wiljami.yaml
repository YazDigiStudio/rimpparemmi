  - image_alt_en: Theatre Wiljami
    title_fi: Pystybaari Wiljami
    image_orientation: landscape
    image_position: right
    title_en: Pystybaari Wiljami
    text_fi: >-
      Pystybaari Wiljami palvelee ennen esitystä ja väliajalla.

      Tarjolla on virvokkeita, viiniä ja pientä purtavaa.


      Juomat saa tuoda katsomoon (ellei toisin mainita), mutta muistetaan yhdessä teatteritunnelma.
    text_en: >-
      Bar Wiljami is open before the performance and during intermission.


      The bar offers soft drinks, wine, and light snacks.


      You may bring your drinks into the seating area (unless otherwise stated), but let’s all help maintain the theatre atmosphere.
    image: https://firebasestorage.googleapis.com/v0/b/rimpparemmi-b3154.firebasestorage.app/o/cms%2Fweb%2F1775587265089-_DSC8161.webp?alt=media
