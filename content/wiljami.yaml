  - image_alt_en: ""
    title_fi: Esteettömyys & saavutettavuus
    image_orientation: landscape
    image_position: left
    title_en: ""
    text_fi: >
      Kulttuuritalo Wiljami ei ole täysin esteetön. Lähes esteetön kulku
      tapahtuu takaoven kautta ja sisätiloista löytyy invahissi, jonka
      painorajoite on 200 kg.

      Katsomossa on pyörätuolipaikkoja kaksi, ja henkilökuntamme auttaa mielellään, jos tarvitset apua saapuessasi.

      Jos sinulla on erityistarpeita, kerrothan niistä etukäteen – tehdään illasta sujuva yhdessä.
    text_en: ""
