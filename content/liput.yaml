      Tanssiteatteri Rimpparemmi myy liput NetTicket.fi-palvelun kautta.
      Rovaniemellä lippuja myy myös Osviitta.


      Hinnat sisältävät palvelumaksun.
    text_en: >
      Dance Theatre Rimpparemmi sells tickets through NetTicket.fi. In
      Rovaniemi, tickets are also available at Osviitta.


      Prices include service fees.
